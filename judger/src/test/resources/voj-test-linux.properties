# Database Configuration
jdbc.driverClassName = com.mysql.cj.jdbc.Driver
# See voj-test.properties in the web module: createDatabaseIfNotExist lets the
# test suite provision its own schema, and sql_mode=STRICT_TRANS_TABLES keeps
# strict validation while dropping ONLY_FULL_GROUP_BY and NO_ZERO_DATE.
jdbc.url = jdbc:mysql://localhost:3306/test?characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true&sessionVariables=sql_mode='STRICT_TRANS_TABLES'
jdbc.username = root
jdbc.password = 
jdbc.initialSize = 1
jdbc.maxActive = 1
jdbc.minIdle = 0
jdbc.maxIdle = 1
jdbc.maxWait = 1800
jdbc.timeBetweenEvictionRunsMillis = 1800
jdbc.minEvictableIdleTimeMillis = 1800
jdbc.removeAbandoned = true
jdbc.removeAbandonedTimeout = 1800

# Message Service Configuration
jms.broker.url = vm://localhost?broker.persistent=false

# Authentication for voj 
judger.username = 
judger.password = 
judger.description =  

# Working Directory
judger.workDir = /tmp
judger.checkpointDir = /tmp/testpoints

# Checkpoint Distribution Configuration (unused by the unit tests, which mock the store)
judger.web.baseUrl = http://localhost:8080/voj
judger.apiToken =

# System User with Lower Privileges (nobody exists on every Linux host, so the
# native sandbox can drop privileges without provisioning a dedicated account).
system.username = nobody
system.password =