# Deployment knobs are resolved at runtime from environment variables, with the
# value after ':' used as the fallback, so every VOJ_* below can be overridden
# without rebuilding the jar, e.g. `docker run -e VOJ_DB_HOST=db.internal ...`.
# A judger must reach the web app's database and message broker, and present the
# same VOJ_JUDGER_API_TOKEN as the web app to download test data.

# Database Configuration
jdbc.driverClassName = com.mysql.cj.jdbc.Driver
jdbc.url = jdbc:mysql://${VOJ_DB_HOST:localhost}:${VOJ_DB_PORT:3306}/${VOJ_DB_NAME:voj}?characterEncoding=UTF-8&serverTimezone=UTC
jdbc.username = ${VOJ_DB_USERNAME:root}
jdbc.password = ${VOJ_DB_PASSWORD:}
jdbc.initialSize = 1
jdbc.maxActive = 4
jdbc.minIdle = 1
jdbc.maxWait = 30000
jdbc.timeBetweenEvictionRunsMillis = 60000
jdbc.minEvictableIdleTimeMillis = 25200000
jdbc.removeAbandoned = false
jdbc.removeAbandonedTimeout = 1800

# Message Service Configuration
jms.broker.url = ${VOJ_JMS_BROKER_URL:tcp://localhost:61616}

# Authentication for voj
judger.username = ${VOJ_JUDGER_USERNAME:voj@judger}
judger.password = ${VOJ_JUDGER_PASSWORD:}
judger.description = ${VOJ_JUDGER_DESCRIPTION:}

# Working Directory
judger.workDir = ${VOJ_JUDGER_WORK_DIR:/tmp}
judger.checkpointDir = ${VOJ_JUDGER_CHECKPOINT_DIR:/tmp/voj-testpoints}

# Checkpoint Distribution Configuration
# The judger downloads a problem's test data from the web application and caches it under
# judger.checkpointDir, re-fetching only when the problem's checkpoints version changes. baseUrl is
# the web application's root; apiToken is the shared secret and must match judger.apiToken on the web.
judger.web.baseUrl = ${VOJ_WEB_BASE_URL:http://localhost:8080/voj}
judger.apiToken = ${VOJ_JUDGER_API_TOKEN:}

# Sandbox backend. "native" is the in-process JNI runner: on Linux it confines
# submissions with setrlimit + a network namespace + a seccomp syscall filter and
# drops privileges to system.username; on Windows it runs them under a separate
# low-privilege account. "isolate" (Linux only) delegates to the external isolate
# tool instead and requires it to be installed.
judger.sandbox = native

# CPU time limit (milliseconds) allowed for compiling a submission. Heavyweight
# toolchains (the Go build driver, the JVM-based Kotlin compiler) need much more
# than a few seconds, otherwise the sandbox kills them and reports a spurious
# "Compile Error".
judger.compileTimeLimit = 20000

# Memory limit (kilobytes) allowed for compiling a submission. Caps "compiler
# bombs" (e.g. C++ template recursion) so they cannot OOM the host. Keep it
# generous enough for kotlinc (JVM) and the Go linker. Default: 512 MB.
judger.compileMemoryLimit = 524288

# isolate sandbox configuration (only used when judger.sandbox = isolate)
judger.isolate.executable = isolate
judger.isolate.boxId = 0
judger.isolate.maxProcesses = 64
judger.isolate.wallTimeBufferSec = 1.0
# Maximum size (kilobytes) of files the sandboxed program may create (disk-bomb
# guard). Mirrors the native runner's 256 MB RLIMIT_FSIZE. 0 means no limit.
judger.isolate.fileSizeLimitKb = 262144

# Unprivileged user the native sandbox drops to before running a submission
# (Linux: any non-root account, "nobody" works out of the box; the password is
# unused on Linux and required only on Windows for the separate logon account).
system.username = nobody
system.password =