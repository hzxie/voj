<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth}" lang="en">
<head>
    <title th:text="#{voj.accounts.reset-password.title} + ' | ' + ${websiteName}">Reset Password</title>
</head>
<body>
    <a layout:fragment="auth-action" class="vw-header-link vw-header-link-accent"
       th:href="@{/accounts/login}">sign in &rarr;</a>
    <div layout:fragment="content">
        <section class="vw-auth">
            <div class="vw-auth-inner">
                <div class="vw-auth-head">
                    <div class="vw-eyebrow">// RECOVER</div>
                    <h1 th:text="#{voj.accounts.reset-password.reset-password}">Reset Password</h1>
                </div>

                <div class="vw-card vw-card-glow">
                    <div class="vw-card-bar">
                        <span class="vw-dot vw-dot-r"></span><span class="vw-dot vw-dot-y"></span><span class="vw-dot vw-dot-g"></span>
                        <span class="vw-card-title">auth &mdash; reset.sh</span>
                    </div>
                    <div class="vw-card-body">
                        <div class="vw-alert vw-alert-error alert-error hide"></div>
                        <div class="vw-alert vw-alert-success alert-success hide"></div>

                        <form id="reset-password-form" method="POST" onSubmit="onSubmit(); return false;" th:if="${isTokenValid}">
                            <div class="vw-formrow">
                                <label class="vw-label" for="email" th:text="#{voj.accounts.reset-password.email}">Email</label>
                                <input id="email" class="vw-input" name="email" type="text" th:value="${email}" maxlength="64" disabled="disabled" />
                            </div>
                            <div class="vw-formrow">
                                <label class="vw-label" for="new-password" th:text="#{voj.accounts.reset-password.new-password}">New Password</label>
                                <input id="new-password" class="vw-input" name="new-password" type="password" maxlength="16" autocomplete="new-password" />
                            </div>
                            <div class="vw-formrow">
                                <label class="vw-label" for="confirm-new-password" th:text="#{voj.accounts.reset-password.confirm-new-password}">Confirm New Password</label>
                                <input id="confirm-new-password" class="vw-input" name="confirm-new-password" type="password" maxlength="16" autocomplete="new-password" />
                            </div>
                            <input id="csrf-token" type="hidden" th:value="${_csrf.token}" />
                            <button class="vw-btn vw-btn-accent vw-btn-block" type="submit">$ <span th:text="#{voj.accounts.reset-password.reset-password}">reset password</span></button>
                        </form>

                        <form id="reset-password-form" method="POST" onSubmit="onSubmit(); return false;" th:unless="${isTokenValid}">
                            <div class="vw-formrow">
                                <label class="vw-label" for="username" th:text="#{voj.accounts.reset-password.username}">Username</label>
                                <div class="vw-field"><span class="sigil">$</span><input id="username" name="username" type="text" maxlength="16" autocomplete="username" /></div>
                            </div>
                            <div class="vw-formrow">
                                <label class="vw-label" for="email" th:text="#{voj.accounts.reset-password.email}">Email</label>
                                <input id="email" class="vw-input" name="email" type="text" maxlength="64" autocomplete="email" />
                            </div>
                            <input id="csrf-token" type="hidden" th:value="${_csrf.token}" />
                            <button class="vw-btn vw-btn-accent vw-btn-block" type="submit" th:text="#{voj.accounts.reset-password.send-verification-email}">Send Verification Email</button>
                        </form>
                    </div>
                </div>

                <p class="vw-auth-foot">
                    <a class="vw-accent" th:href="@{/accounts/login}" th:text="#{voj.accounts.register.sign-in}">&larr; Back to sign in</a>
                </p>
            </div>
        </section>
    </div>

    <th:block layout:fragment="scripts">
    <th:block th:if="${isTokenValid}">
    <script type="text/javascript" th:inline="javascript">
        function onSubmit() {
            $('.alert-error').addClass('hide');
            $('button[type=submit]').attr('disabled', 'disabled');
            $('button[type=submit]').html([[#{voj.accounts.reset-password.please-wait}]]);

            var email           = [[${email}]],
                token           = [[${token}]],
                newPassword     = $('#new-password').val(),
                confirmPassword = $('#confirm-new-password').val(),
                csrfToken       = $('#csrf-token').val();

            return doResetPasswordAction(email, token, newPassword, confirmPassword, csrfToken);
        }
        function doResetPasswordAction(email, token, newPassword, confirmPassword, csrfToken) {
            $.ajax({
                type: 'POST',
                url: [[@{/accounts/resetPassword.action}]],
                data: { 'email': email, 'token': token, 'newPassword': newPassword, 'confirmPassword': confirmPassword, 'csrfToken': csrfToken },
                dataType: 'JSON',
                success: function(result){ return processResult(result); }
            });
        }
        function processResult(result) {
            if ( result['isSuccessful'] ) {
                $('.alert-success').html([[#{voj.accounts.reset-password.password-resetted}]]);
                $('.alert-success').removeClass('hide');
                $('#reset-password-form').addClass('hide');
            } else {
                var errorMessage  = '';
                if ( !result['isEmailValidationValid'] ) {
                    errorMessage += [[#{voj.accounts.reset-password.invalid-email-token}]] + '<br>';
                }
                if ( result['isNewPasswordEmpty'] ) {
                    errorMessage += [[#{voj.accounts.reset-password.new-password-empty}]] + '<br>';
                } else if ( !result['isNewPasswordLegal'] ) {
                    errorMessage += [[#{voj.accounts.reset-password.new-password-illegal}]] + '<br>';
                }
                if ( !result['isConfirmPasswordMatched'] ) {
                    errorMessage += [[#{voj.accounts.reset-password.new-password-not-matched}]] + '<br>';
                }
                $('.alert-error').html(errorMessage);
                $('.alert-error').removeClass('hide');
            }
            $('button[type=submit]').html('$ ' + [[#{voj.accounts.reset-password.reset-password}]]);
            $('button[type=submit]').removeAttr('disabled');
        }
    </script>
    </th:block>
    <th:block th:unless="${isTokenValid}">
    <script type="text/javascript" th:inline="javascript" th:if="${!#strings.isEmpty(token)}">
        $(function() {
            $('.alert-error').html([[#{voj.accounts.reset-password.invalid-email-token}]]);
            $('.alert-error').removeClass('hide');
            $('#reset-password-form').addClass('hide');
        });
    </script>
    <script type="text/javascript" th:inline="javascript">
        function onSubmit() {
            $('.alert-error').addClass('hide');
            $('button[type=submit]').attr('disabled', 'disabled');
            $('button[type=submit]').html([[#{voj.accounts.reset-password.please-wait}]]);

            var username    = $('#username').val(),
                email       = $('#email').val(),
                csrfToken   = $('#csrf-token').val();

            return doResetPasswordAction(username, email, csrfToken);
        }
        function doResetPasswordAction(username, email, csrfToken) {
            $.ajax({
                type: 'POST',
                url: [[@{/accounts/forgotPassword.action}]],
                data: { 'username': username, 'email': email, 'csrfToken': csrfToken },
                dataType: 'JSON',
                success: function(result){ return processResult(result); }
            });
        }
        function processResult(result) {
            if ( result['isSuccessful'] ) {
                $('.alert-success').html([[#{voj.accounts.reset-password.mail-sent}]]);
                $('.alert-success').removeClass('hide');
                $('#reset-password-form').addClass('hide');
            } else {
                var errorMessage  = '';
                if ( !result['isUserExists'] ) {
                    errorMessage += [[#{voj.accounts.reset-password.user-not-exists}]] + '<br>';
                }
                $('.alert-error').html(errorMessage);
                $('.alert-error').removeClass('hide');
            }
            $('button[type=submit]').html([[#{voj.accounts.reset-password.send-verification-email}]]);
            $('button[type=submit]').removeAttr('disabled');
        }
    </script>
    </th:block>
    </th:block>
</body>
</html>
