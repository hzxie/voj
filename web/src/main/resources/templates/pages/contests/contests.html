<!DOCTYPE html>
<!--/* Reproduced from voj-design/Contests.dc.html: // CONTESTS header, // LIVE & UPCOMING
       cards (type badge, title, status, window/duration/problems/entrants) and a
       // PAST CONTESTS table (type/title/window/entrants/problems). The design's per-user
       RANK column is omitted (computing a contestant's rank for every past contest is too
       costly for a list view); the problems count is shown in its place. The load-more
       behaviour for older past contests is preserved. */-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}" lang="en">
<head>
    <title th:text="#{voj.contests.contests.title} + ' | ' + ${websiteName}">Contests</title>
</head>
<body>
    <div layout:fragment="content">
        <section class="vw-pagehead">
            <div class="vw-eyebrow vw-eyebrow-path" th:text="'~/' + #{voj.include.header.nav-contests}">~/contests</div>
            <h1 th:text="#{voj.contests.contests.title}">Contests</h1>
            <div class="sub" th:text="#{voj.contests.contests.subtitle}">ACM &amp; OI rounds · solve against the clock</div>
        </section>

        <!-- LIVE & UPCOMING -->
        <section class="vw-section vw-section-narrow">
            <div class="vw-section-label" th:text="'// ' + #{voj.contests.contests.live-upcoming}">// LIVE &amp; UPCOMING</div>
            <div class="vw-contest-list">
                <a class="vw-contest-card" th:each="contest : ${liveContests}"
                   th:with="durMin=${(contest.endTime.time - contest.startTime.time) / 60000},
                            isReady=${currentTime.before(contest.startTime)}"
                   th:href="@{/contest/{id}(id=${contest.contestId})}">
                    <div class="vw-contest-cardhead">
                        <span class="vw-ctype" th:classappend="${contest.contestMode == 'ACM'} ? 'vw-ctype-acm' : 'vw-ctype-oi'" th:text="${contest.contestMode}">ACM</span>
                        <span class="vw-ctitle" th:text="${contest.contestName}">Contest</span>
                        <div class="vw-header-spacer"></div>
                        <span class="vw-cstatus" th:classappend="${isReady} ? 'vw-cstatus-ready' : 'vw-cstatus-live'">
                            <span class="dot"></span><span th:text="${isReady ? #messages.msg('voj.contests.contests.status-upcoming') : #messages.msg('voj.contests.contests.status-live')}">Live</span>
                        </span>
                    </div>
                    <div class="vw-cmeta">
                        <span>&#128197; <span th:text="${@dateFormatter.dateTimeLongMedium(contest.startTime, language)}">start</span> &rarr; <span th:text="${@dateFormatter.dateTimeLongMedium(contest.endTime, language)}">end</span></span>
                        <span>&#9201; <span th:text="|${durMin / 60}h ${#numbers.formatInteger(durMin % 60, 2)}m|">2h 00m</span></span>
                        <span>&#128221; <span th:text="${problemCountOfContests.get(contest.contestId)}">0</span> <span th:text="#{voj.contests.contests.problems}">problems</span></span>
                        <span>&#128101; <span th:text="${entrantsOfContests.get(contest.contestId)}">0</span> <span th:text="#{voj.contests.contests.entrants}">entrants</span></span>
                    </div>
                </a>
                <p class="vw-muted vw-card-empty" th:if="${liveContests == null or liveContests.isEmpty()}" th:text="#{voj.contests.contests.no-contests}">No live or upcoming contests.</p>
            </div>
        </section>

        <!-- PAST CONTESTS -->
        <section class="vw-section vw-section-narrow vw-section-table">
            <div class="vw-section-label" th:text="'// ' + #{voj.contests.contests.past-contests}">// PAST CONTESTS</div>
            <div class="vw-tablewrap">
                <div class="vw-table vw-table-contests">
                    <div class="vw-table-head">
                        <div th:text="#{voj.contests.contests.col-type}">TYPE</div>
                        <div th:text="#{voj.contests.contests.col-title}">Title</div>
                        <div th:text="#{voj.contests.contests.col-window}">WINDOW</div>
                        <div th:text="#{voj.contests.contests.col-entrants}">ENTRANTS</div>
                        <div th:text="#{voj.contests.contests.col-problems}">PROBLEMS</div>
                    </div>
                    <div id="past-contests-body">
                        <a class="vw-table-row" th:each="contest : ${pastContests}"
                           th:with="durMin=${(contest.endTime.time - contest.startTime.time) / 60000}"
                           th:href="@{/contest/{id}(id=${contest.contestId})}">
                            <div><span class="vw-ctype-sm" th:classappend="${contest.contestMode == 'ACM'} ? 'vw-ctype-acm' : 'vw-ctype-oi'" th:text="${contest.contestMode}">OI</span></div>
                            <div class="vw-cell-title vw-ellipsis" th:text="${contest.contestName}">Contest</div>
                            <div class="vw-muted2" th:text="|${@dateFormatter.dateShort(contest.startTime, language)} · ${durMin / 60}h|">window</div>
                            <div class="vw-muted2" th:text="${entrantsOfContests.get(contest.contestId)}">0</div>
                            <div class="vw-muted2" th:text="${problemCountOfContests.get(contest.contestId)}">0</div>
                        </a>
                    </div>
                </div>
            </div>
            <div id="more-contests" class="vw-loadmore">
                <p class="availble" th:text="#{voj.contests.contests.more-contests}">More Contests...</p>
                <span class="vw-spinner hide" role="status" aria-label="Loading"></span>
            </div>
        </section>
    </div>

    <th:block layout:fragment="scripts">
    <script type="text/javascript" th:inline="javascript">
        var loadedContests = [[${loadedContests}]];

        function setLoadingStatus(isLoading) {
            if ( isLoading ) {
                $('p', '#more-contests').addClass('hide');
                $('.vw-spinner', '#more-contests').removeClass('hide');
            } else {
                $('.vw-spinner', '#more-contests').addClass('hide');
                $('p', '#more-contests').removeClass('hide');
            }
        }
        $('#more-contests').click(function() {
            var isLoading     = $('.vw-spinner', this).is(':visible'),
                hasNextRecord = $('p', this).hasClass('availble');
            if ( !isLoading && hasNextRecord ) {
                setLoadingStatus(true);
                return getMoreContests(loadedContests);
            }
        });
        function getMoreContests(startIndex) {
            $.ajax({
                type: 'GET',
                url: [[@{/contest/getContests.action}]],
                data: { 'startIndex': startIndex },
                dataType: 'JSON',
                success: function(result){ return processContestsResult(result); }
            });
        }
        function processContestsResult(result) {
            if ( result['isSuccessful'] ) {
                displayPastContests(result['contests'], result['entrants'], result['problemCount']);
            } else {
                $('p', '#more-contests').removeClass('availble');
                $('#more-contests').addClass('is-done');
                $('p', '#more-contests').html([[#{voj.contests.contests.no-more-contests}]]);
            }
            setLoadingStatus(false);
        }
        function displayPastContests(contests, entrants, problemCount) {
            var typeClass = function(mode){ return mode === 'ACM' ? 'vw-ctype-acm' : 'vw-ctype-oi'; };
            for ( var i = 0; i < contests.length; ++ i ) {
                var c = contests[i];
                loadedContests += 1;
                var now = new Date(), et = new Date(c['endTime']);
                if ( now <= et ) { continue; }
                var durMin = Math.round((et - new Date(c['startTime'])) / 60000),
                    hours  = Math.floor(durMin / 60),
                    cid    = c['contestId'];
                var html = '<a class="vw-table-row" href="' + [[@{/contest/}]] + cid + '">' +
                    '<div><span class="vw-ctype-sm ' + typeClass(c['contestMode']) + '">' + c['contestMode'] + '</span></div>' +
                    '<div class="vw-cell-title vw-ellipsis">' + c['contestName'] + '</div>' +
                    '<div class="vw-muted2">' + getFormatedDateString(c['startTime'], [[${language}]]) + ' · ' + hours + 'h</div>' +
                    '<div class="vw-muted2">' + (entrants[cid] || 0) + '</div>' +
                    '<div class="vw-muted2">' + (problemCount[cid] || 0) + '</div>' +
                    '</a>';
                $('#past-contests-body').append(html);
            }
        }
    </script>
    </th:block>
</body>
</html>
