<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${language}" lang="en">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{voj.misc.not-supported.title} + ' | ' + ${websiteName}">Browser no longer supported</title>
    <meta name="robots" content="noindex" />
    <meta name="author" content="Haozhe Xie" />
    <link th:href="|${cdnUrl}/img/favicon.ico|" rel="shortcut icon" type="image/x-icon" />
    <!--/* Standalone page served to very old browsers; uses plain hex colours
           (not CSS variables) so it renders even where custom properties fail. */-->
    <style type="text/css">
        body { margin:0; padding:50px; background:#0a0c0b; color:#cdd9d1;
               font-family:'Courier New',monospace; font-size:13px; line-height:1.6; }
        a { color:#34d399; text-decoration:none; }
        a img { border:0; }
        .logo { font-size:20px; font-weight:bold; color:#eafff5; margin-bottom:24px; }
        .logo b { color:#34d399; }
        h1 { font-size:20px; color:#eafff5; }
        table { border-collapse:collapse; }
        .footer { font-size:12px; text-align:center; margin-top:40px; color:#6f8479; }
    </style>
</head>
<body>
    <div class="logo"><b>&lt;</b>verwandlung<b>&gt;_</b></div>
    <h1 th:text="#{voj.misc.not-supported.browser-not-supported}">Your Browser is no longer supported.</h1>
    <p th:text="#{voj.misc.not-supported.message(${websiteName})}">This site no longer supports your browser. Please upgrade your browser.</p>
    <table width="650px" cellpadding="5">
        <tbody>
            <tr>
                <td align="center" valign="center" width="120px"><a th:href="|https://www.google.com/chrome/?hl=${language}|"><img th:src="|${cdnUrl}/img/browsers/chrome.jpg|" width="120px" height="120px" /></a></td>
                <td align="center" valign="center" width="120px"><a href="https://www.mozilla.org/firefox/"><img th:src="|${cdnUrl}/img/browsers/firefox.jpg|" width="120px" height="120px" /></a></td>
                <td align="center" valign="center" width="120px"><a href="https://www.microsoft.com/edge"><img th:src="|${cdnUrl}/img/browsers/ie.jpg|" width="120px" height="120px" /></a></td>
                <td align="center" valign="center" width="120px"><a href="https://www.opera.com/"><img th:src="|${cdnUrl}/img/browsers/opera.jpg|" width="120px" height="120px" /></a></td>
                <td align="center" valign="center" width="120px"><a href="https://www.apple.com/safari/"><img th:src="|${cdnUrl}/img/browsers/safari.jpg|" width="120px" height="120px" /></a></td>
            </tr>
            <tr>
                <td align="center" valign="top"><a th:href="|https://www.google.com/chrome/?hl=${language}|"><span th:text="#{voj.misc.not-supported.download}">Download</span> Google Chrome</a></td>
                <td align="center" valign="top"><a href="https://www.mozilla.org/firefox/"><span th:text="#{voj.misc.not-supported.download}">Download</span> Firefox</a></td>
                <td align="center" valign="top"><a href="https://www.microsoft.com/edge"><span th:text="#{voj.misc.not-supported.download}">Download</span> Microsoft Edge</a></td>
                <td align="center" valign="top"><a href="https://www.opera.com/"><span th:text="#{voj.misc.not-supported.download}">Download</span> Opera</a></td>
                <td align="center" valign="top"><a href="https://www.apple.com/safari/"><span th:text="#{voj.misc.not-supported.download}">Download</span> Safari</a></td>
            </tr>
        </tbody>
    </table>
    <div class="footer">&copy;<span th:text="${#dates.year(#dates.createNow())}">2026</span> <span th:utext="${copyright}">Infinite Script</span></div>
    <th:block th:if="${googleAnalyticsCode != null and googleAnalyticsCode != ''}" th:utext="${googleAnalyticsCode}"></th:block>
</body>
</html>
