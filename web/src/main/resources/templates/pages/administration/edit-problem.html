<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}" lang="en">
<head>
    <title th:text="#{voj.administration.edit-problem.title} + ' - ' + ${problem.problemName} + ' | ' + ${websiteName}">Edit Problem</title>
</head>
<body>
    <div layout:fragment="content">
    <form id="problem-form" class="adm-detail" onSubmit="onSubmit(); return false;"
          th:with="currentDifficulty=${problem.problemDifficulty != null ? problem.problemDifficulty.problemDifficultySlug : ''}">

        <div class="adm-detail-top">
            <a class="adm-back" th:href="@{/administration/all-problems}">&#8592; <span th:text="#{voj.administration.edit-problem.back}">back to problems</span></a>
            <span class="adm-idchip" th:text="'#' + ${problem.problemId}">#1</span>
            <input id="problem-id" type="hidden" th:value="${problem.problemId}" />
            <div style="flex:1;"></div>
            <a class="adm-btn-tn" th:href="@{/p/{id}(id=${problem.problemId})}" target="_blank" th:text="#{voj.administration.edit-problem.view-problem}">view</a>
            <button type="button" class="adm-btn-tn danger" id="delete-problem" th:text="#{voj.administration.edit-problem.delete-problem}">delete</button>
            <button type="submit" class="adm-btn-tn go" th:text="'$ ' + #{voj.administration.edit-problem.update-problem}">$ save</button>
        </div>

        <div class="alert alert-error hide"></div>
        <div class="alert alert-success hide"><span th:text="#{voj.administration.edit-problem.problem-edited}">Problem updated.</span> <a th:href="@{/p/{id}(id=${problem.problemId})}" th:text="#{voj.administration.edit-problem.view-problem}">view</a></div>

        <div class="adm-ed2">
            <div class="adm-col">
                <div class="adm-card">
                    <div class="adm-card-head plain" th:text="#{voj.administration.edit-problem.statement}">// STATEMENT</div>
                    <div class="adm-card-body">
                        <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.problem-name}">TITLE</span><input id="problem-name" class="adm-input" type="text" maxlength="128" th:value="${problem.problemName}" /></label>
                        <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.problem-description}">DESCRIPTION · markdown</span><div id="markdown-editor"><textarea id="wmd-input" class="wmd-input" th:text="${problem.description}"></textarea></div></label>
                        <div class="adm-grid-2">
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.input-format}">INPUT FORMAT</span><textarea id="input-format" class="adm-input" rows="3" th:text="${problem.inputFormat}"></textarea></label>
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.output-format}">OUTPUT FORMAT</span><textarea id="output-format" class="adm-input" rows="3" th:text="${problem.outputFormat}"></textarea></label>
                        </div>
                        <div class="adm-grid-2">
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.input-sample}">INPUT SAMPLE</span><textarea id="input-sample" class="adm-input code" rows="3" th:text="${problem.sampleInput}"></textarea></label>
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.output-sample}">OUTPUT SAMPLE</span><textarea id="output-sample" class="adm-input code" rows="3" th:text="${problem.sampleOutput}"></textarea></label>
                        </div>
                        <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.hint}">HINT</span><textarea id="hint" class="adm-input" rows="2" th:text="${problem.hint}"></textarea></label>
                    </div>
                </div>
                <div class="adm-card">
                    <div class="adm-card-head"><span th:text="#{voj.administration.edit-problem.test-cases}">// TEST CASES</span><span class="act" id="new-test-case" th:text="#{voj.administration.edit-problem.new-test-case}">+ add sample</span></div>
                    <div id="test-cases" class="adm-card-body" style="gap:0;">
                        <p id="no-test-cases" class="adm-cell muted" th:classappend="${!checkpoints.isEmpty()} ? 'hide'" th:text="#{voj.administration.edit-problem.no-test-cases}">No test cases.</p>
                        <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:14px;">
                            <li class="test-case adm-card" style="border-radius:11px;" th:each="checkpoint,iter : ${checkpoints}">
                                <div class="adm-card-head"><span th:text="#{voj.administration.edit-problem.test-case} + ' #' + ${iter.index}">Test Case #0</span><span class="del-test" style="cursor:pointer;color:var(--text3);">&#10005;</span></div>
                                <div class="adm-card-body" style="gap:10px;">
                                    <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.standard-input}">INPUT</span><textarea class="standard-input adm-input code" rows="2" th:text="${checkpoint.input}"></textarea></label>
                                    <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.standard-output}">OUTPUT</span><textarea class="standard-output adm-input code" rows="2" th:text="${checkpoint.output}"></textarea></label>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="adm-col">
                <div class="adm-card">
                    <div class="adm-card-head plain" th:text="#{voj.administration.edit-problem.properties}">// PROPERTIES</div>
                    <div class="adm-card-body">
                        <div>
                            <div class="adm-block-label" th:text="#{voj.administration.edit-problem.difficulty}">DIFFICULTY</div>
                            <div class="adm-seg" data-adm="seg" data-input="problem-difficulty">
                                <a href="javascript:void(0);" th:each="difficulty : ${problemDifficulties}" th:data-value="${difficulty.problemDifficultySlug}" th:classappend="${difficulty.problemDifficultySlug == currentDifficulty} ? 'active'" th:text="${difficulty.problemDifficultyName}">Easy</a>
                            </div>
                            <input type="hidden" id="problem-difficulty" th:value="${currentDifficulty}" />
                        </div>
                        <div class="adm-grid-2">
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.time-limit}">TIME · ms</span><input id="time-limit" class="adm-input" type="text" maxlength="8" th:value="${problem.timeLimit}" /></label>
                            <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.memory-limit}">MEMORY · KB</span><input id="memory-limit" class="adm-input" type="text" maxlength="8" th:value="${problem.memoryLimit}" /></label>
                        </div>
                        <div class="vw-between"><span class="adm-cell txt" th:text="#{voj.administration.edit-problem.is-public}">Public to users</span><div class="adm-switch" id="problem-is-public" data-adm="switch" th:classappend="${problem.isPublic()} ? 'on'"><div class="knob"></div></div></div>
                        <div class="vw-between"><span class="adm-cell txt" th:text="#{voj.administration.edit-problem.test-case-exactly-match}">Exact match</span><div class="adm-switch" id="problem-is-exactly-match" data-adm="switch"><div class="knob"></div></div></div>
                    </div>
                </div>
                <div class="adm-card">
                    <div class="adm-card-head plain" th:text="#{voj.administration.edit-problem.problem-categories}">// CATEGORIES</div>
                    <div class="adm-card-body" style="gap:8px;">
                        <th:block th:each="entry : ${problemCategories}">
                            <label class="checkbox" style="display:flex;align-items:center;gap:8px;color:var(--head);font-size:13px;"><input type="checkbox" class="category-check" th:value="${entry.key.problemCategorySlug}" /> <span th:text="${entry.key.problemCategoryName}">Category</span></label>
                            <label th:each="problemCategory : ${entry.value}" class="checkbox" style="display:flex;align-items:center;gap:8px;color:var(--text2);font-size:12.5px;padding-left:20px;"><input type="checkbox" class="category-check" th:value="${problemCategory.problemCategorySlug}" /> <span th:text="${problemCategory.problemCategoryName}">Subcategory</span></label>
                        </th:block>
                    </div>
                </div>
                <div class="adm-card">
                    <div class="adm-card-head plain" th:text="#{voj.administration.edit-problem.problem-tags}">// TAGS</div>
                    <div class="adm-card-body">
                        <label class="adm-flabel"><span th:text="#{voj.administration.edit-problem.problem-tags-hint}">COMMA-SEPARATED</span><input id="problem-tags" class="adm-input" type="text" th:value="${#strings.listJoin(problemTags.![problemTagName], ',')}" /></label>
                    </div>
                </div>
                <div class="adm-danger">
                    <div>
                        <div class="t" th:text="#{voj.administration.edit-problem.delete-problem}">Delete problem</div>
                        <div class="d" th:text="#{voj.administration.edit-problem.delete-hint}">Removes the problem and its submissions.</div>
                    </div>
                    <button type="button" class="adm-btn-tn danger" id="delete-problem-2" th:text="#{voj.administration.edit-problem.delete-problem}">delete</button>
                </div>
            </div>
        </div>

    </form>
    </div>

    <th:block layout:fragment="scripts">
    <script type="text/javascript" th:inline="javascript">
        var descriptionEditor;
        $(function() {
            descriptionEditor = createMarkdownEditor('#wmd-input');
            // Pre-check the selected categories.
            /*[# th:each="problemCategory : ${selectedProblemCategories}"]*/
            $('.category-check[value="[(${problemCategory.problemCategorySlug})]"]').prop('checked', true);
            /*[/]*/
        });

        function getTestCaseContainer(n, input, output) {
            return '<li class="test-case adm-card" style="border-radius:11px;">' +
                   '  <div class="adm-card-head"><span>' + [[#{voj.administration.edit-problem.test-case}]] + ' #' + n + '</span><span class="del-test" style="cursor:pointer;color:var(--text3);">&#10005;</span></div>' +
                   '  <div class="adm-card-body" style="gap:10px;">' +
                   '    <label class="adm-flabel"><span>' + [[#{voj.administration.edit-problem.standard-input}]] + '</span><textarea class="standard-input adm-input code" rows="2">' + (input || '') + '</textarea></label>' +
                   '    <label class="adm-flabel"><span>' + [[#{voj.administration.edit-problem.standard-output}]] + '</span><textarea class="standard-output adm-input code" rows="2">' + (output || '') + '</textarea></label>' +
                   '  </div>' +
                   '</li>';
        }
        function renumberTestCases() {
            $('li.test-case', '#test-cases').each(function(i) { $('.adm-card-head span:first-child', this).text([[#{voj.administration.edit-problem.test-case}]] + ' #' + i); });
        }
        $('#new-test-case').click(function() {
            $('#no-test-cases').addClass('hide');
            $('#test-cases > ul').append(getTestCaseContainer($('li.test-case', '#test-cases').length));
        });
        $('#test-cases').on('click', '.del-test', function() {
            $(this).closest('.test-case').remove();
            renumberTestCases();
            if ($('li.test-case', '#test-cases').length === 0) { $('#no-test-cases').removeClass('hide'); }
        });

        function getTestCases() {
            var testCases = [];
            $('li.test-case').each(function() { testCases.push({ 'input': $('.standard-input', this).val(), 'output': $('.standard-output', this).val() }); });
            return JSON.stringify(testCases);
        }
        function getProblemCategories() {
            var categories = [];
            $('.category-check:checked').each(function() { categories.push($(this).val()); });
            return JSON.stringify(categories);
        }
        function getProblemTags() {
            var t = $('#problem-tags').val();
            return JSON.stringify(t ? t.split(',').map(function(s){ return s.trim(); }).filter(Boolean) : []);
        }
        function onSubmit() {
            $('.alert-success, .alert-error', '#problem-form').addClass('hide');
            $('button[type=submit]', '#problem-form').attr('disabled', 'disabled').html([[#{voj.administration.edit-problem.please-wait}]]);
            editProblem($('#problem-id').val(), $('#problem-name').val(), $('#time-limit').val(), $('#memory-limit').val(),
                descriptionEditor ? descriptionEditor.value() : '', $('#hint').val(), $('#input-format').val(),
                $('#output-format').val(), $('#input-sample').val(), $('#output-sample').val(), getTestCases(),
                getProblemCategories(), getProblemTags(),
                document.getElementById('problem-is-public').classList.contains('on'),
                document.getElementById('problem-is-exactly-match').classList.contains('on'),
                document.getElementById('problem-difficulty').value);
        }
        function editProblem(problemId, problemName, timeLimit, memoryLimit, description, hint, inputFormat, outputFormat, inputSample, outputSample, testCases, problemCategories, problemTags, isPublic, isExactlyMatch, problemDifficulty) {
            $.ajax({
                type: 'POST', url: [[@{/administration/editProblem.action}]],
                data: { problemId:problemId, problemName:problemName, timeLimit:timeLimit, memoryLimit:memoryLimit, description:description, hint:hint,
                        inputFormat:inputFormat, outputFormat:outputFormat, inputSample:inputSample, outputSample:outputSample,
                        testCases:testCases, problemCategories:problemCategories, problemTags:problemTags,
                        isPublic:isPublic, isExactlyMatch:isExactlyMatch, problemDifficulty:problemDifficulty },
                dataType: 'JSON', success: function(result){ processEditProblemResult(result); }
            });
        }
        function processEditProblemResult(result) {
            if (result['isSuccessful']) {
                $('.alert-error').addClass('hide');
                $('.alert-success').removeClass('hide');
            } else {
                var m = '';
                if (!result['isProblemExists']) { m += [[#{voj.administration.edit-problem.problem-not-exist}]] + '<br>'; }
                if (result['isProblemNameEmpty']) { m += [[#{voj.administration.edit-problem.problem-name-empty}]] + '<br>'; }
                else if (!result['isProblemNameLegal']) { m += [[#{voj.administration.edit-problem.problem-name-illegal}]] + '<br>'; }
                if (!result['isTimeLimitLegal']) { m += [[#{voj.administration.edit-problem.time-limit-illegal}]] + '<br>'; }
                if (!result['isMemoryLimitLegal']) { m += [[#{voj.administration.edit-problem.memory-limit-illegal}]] + '<br>'; }
                if (result['isDescriptionEmpty']) { m += [[#{voj.administration.edit-problem.description-empty}]] + '<br>'; }
                if (result['isInputFormatEmpty']) { m += [[#{voj.administration.edit-problem.input-format-empty}]] + '<br>'; }
                if (result['isOutputFormatEmpty']) { m += [[#{voj.administration.edit-problem.output-format-empty}]] + '<br>'; }
                if (result['isInputSampleEmpty']) { m += [[#{voj.administration.edit-problem.input-sample-empty}]] + '<br>'; }
                if (result['isOutputSampleEmpty']) { m += [[#{voj.administration.edit-problem.output-sample-empty}]] + '<br>'; }
                $('.alert-error', '#problem-form').html(m).removeClass('hide');
            }
            $('button[type=submit]', '#problem-form').removeAttr('disabled').html('$ ' + [[#{voj.administration.edit-problem.update-problem}]]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function deleteProblem() {
            if (!confirm([[#{voj.administration.edit-problem.continue-or-not}]])) { return; }
            $.ajax({
                type: 'POST', url: [[@{/administration/deleteProblems.action}]],
                data: { 'problems': JSON.stringify([ $('#problem-id').val() ]) }, dataType: 'JSON',
                success: function(result){
                    if (result['isSuccessful']) { window.location.href = [[@{/administration/all-problems}]]; }
                    else { $('.alert-error').html([[#{voj.administration.edit-problem.delete-error}]]).removeClass('hide'); }
                }
            });
        }
        ['delete-problem', 'delete-problem-2'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.addEventListener('click', deleteProblem);
        });
    </script>
    </th:block>
</body>
</html>
