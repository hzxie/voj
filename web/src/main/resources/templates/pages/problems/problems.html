<!DOCTYPE html>
<!--/* Reproduced from voj-design/Problems.dc.html: // PROBLEM SET header, ID/Title/Tag
       segmented filter + $ search, ST/#/TITLE/TAGS/ACCEPT/LEVEL grid, numbered pager. */-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}" lang="en">
<head>
    <title th:text="#{voj.problems.problems.title} + ' | ' + ${websiteName}">Problems</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- PAGE HEADER + FILTERS -->
        <section class="vw-pagehead">
            <div class="vw-eyebrow">// PROBLEM SET</div>
            <h1>Problem Set</h1>
            <div class="sub vw-filters-sub"><span th:text="${totalProblems}">0</span> problems &middot; solve to level up</div>
            <div class="vw-filters" th:with="fieldLabel=${field == 'id' ? 'id' : (field == 'tag' ? 'tag' : 'title')}">
                <div class="vw-seg">
                    <a th:href="@{/p(field='id',query=${query})}" th:classappend="${field == 'id'} ? 'active'">ID</a>
                    <a th:href="@{/p(field='title',query=${query})}" th:classappend="${field == 'title'} ? 'active'">Title</a>
                    <a th:href="@{/p(field='tag',query=${query})}" th:classappend="${field == 'tag'} ? 'active'">Tag</a>
                </div>
                <form class="vw-field vw-filters-search" method="GET" th:action="@{/p}">
                    <span class="sigil">$</span>
                    <input type="hidden" name="field" th:value="${field}" />
                    <input type="text" name="query" th:value="${query}" th:placeholder="|filter by ${fieldLabel}&#8230;|" />
                    <span class="vw-filters-count"><span th:text="${totalProblems}">0</span> <span th:text="${totalProblems == 1 ? 'match' : 'matches'}">matches</span></span>
                </form>
            </div>
        </section>

        <!-- TABLE -->
        <section class="vw-section-table">
            <div class="vw-table vw-ptable" th:classappend="${!isLogin} ? 'vw-ptable-guest'">
                <div class="vw-table-head">
                    <div th:if="${isLogin}">ST</div>
                    <div>#</div>
                    <div>TITLE</div>
                    <div>LEVEL</div>
                    <div class="ptable-hide">TAGS</div>
                    <div class="ptable-hide">ACCEPT</div>
                </div>
                <a class="vw-table-row" th:each="problem : ${problems}" th:href="@{/p/{id}(id=${problem.problemId})}">
                    <div th:if="${isLogin}" th:with="sub=${submissionOfProblems != null ? submissionOfProblems[problem.problemId] : null}">
                        <span th:if="${sub != null}" class="vw-vbadge"
                              th:classappend="|flag-${#strings.toLowerCase(sub.judgeResult.judgeResultSlug)}|"
                              th:text="${sub.judgeResult.judgeResultSlug}">AC</span>
                    </div>
                    <div class="vw-muted" th:text="${problem.problemId}">1000</div>
                    <div class="vw-head vw-strong" th:text="${problem.problemName}">Problem</div>
                    <div class="lvl"
                         th:with="slug=${problem.problemDifficulty != null ? problem.problemDifficulty.problemDifficultySlug : 'easy'}"
                         th:classappend="${'lvl-' + slug}"
                         th:text="${problem.problemDifficulty != null ? problem.problemDifficulty.problemDifficultyName : 'Easy'}">Easy</div>
                    <div class="ptable-hide tags">
                        <span class="vw-tag" th:each="tag : ${problemTagsOfProblems != null ? problemTagsOfProblems[problem.problemId] : null}" th:text="${tag.problemTagName}">tag</span>
                    </div>
                    <div class="ptable-hide vw-muted2">
                        <span th:if="${problem.totalSubmission == 0}">0%</span>
                        <span th:unless="${problem.totalSubmission == 0}"
                              th:text="${#numbers.formatDecimal(problem.acceptedSubmission * 100.0 / problem.totalSubmission, 1, 0)} + '%'">0%</span>
                    </div>
                </a>
                <div class="vw-table-empty" th:if="${problems == null or problems.isEmpty()}">// no problems match the filter</div>
            </div>

            <!-- PAGER -->
            <div class="vw-pager" th:if="${totalPages > 1}">
                <a class="nav" th:if="${currentPage > 1}" th:href="@{/p(page=${currentPage - 1},field=${field},query=${query})}">&larr;</a>
                <span class="nav" th:unless="${currentPage > 1}">&larr;</span>

                <a th:if="${windowStart > 1}" th:href="@{/p(page=1,field=${field},query=${query})}">1</a>
                <span class="gap" th:if="${windowStart > 2}">&hellip;</span>

                <th:block th:each="p : ${#numbers.sequence(windowStart, windowEnd)}">
                    <span th:if="${p == currentPage}" class="active" th:text="${p}">1</span>
                    <a th:unless="${p == currentPage}" th:href="@{/p(page=${p},field=${field},query=${query})}" th:text="${p}">2</a>
                </th:block>

                <span class="gap" th:if="${windowEnd < totalPages - 1}">&hellip;</span>
                <a th:if="${windowEnd < totalPages}" th:href="@{/p(page=${totalPages},field=${field},query=${query})}" th:text="${totalPages}">N</a>

                <a class="nav" th:if="${currentPage < totalPages}" th:href="@{/p(page=${currentPage + 1},field=${field},query=${query})}">&rarr;</a>
                <span class="nav" th:unless="${currentPage < totalPages}">&rarr;</span>
            </div>
        </section>
    </div>
</body>
</html>
