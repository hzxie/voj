<!DOCTYPE html>
<!--/* Reproduced from voj-design/Judgers.dc.html. KPIs + node cards are bound to live
       telemetry reported by each judger's heartbeat (CPU/memory/uptime/online status).
       Cluster KPIs the heartbeat cannot measure (queue depth, median latency, 30-day
       uptime) are replaced with real derived metrics: online count, avg CPU, avg memory.
       Styling lives in app.css; only data-driven bar widths stay as inline style. */-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}" lang="en">
<head>
    <title th:text="#{voj.misc.judgers.title} + ' | ' + ${websiteName}">Judgers</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- PAGE HEADER -->
        <section class="vw-pagehead">
            <div class="vw-eyebrow">// JUDGER CLUSTER</div>
            <h1>Judgers</h1>
            <div class="sub vw-livesub">distributed via ActiveMQ <span class="vw-livedot"></span></div>
        </section>

        <!-- KPIs -->
        <section class="vw-section">
            <div class="vw-kpis">
                <div class="vw-kpi"><div class="v accent"><span th:text="${onlineJudgers}">0</span> / <span th:text="${totalJudgers}">0</span></div><div class="k">JUDGERS ONLINE</div></div>
                <div class="vw-kpi"><div class="v"><span th:text="${averageCpuLoad}">0</span>%</div><div class="k">AVG CPU LOAD</div></div>
                <div class="vw-kpi"><div class="v"><span th:text="${averageMemoryUsage}">0</span>%</div><div class="k">AVG MEMORY</div></div>
                <div class="vw-kpi"><div class="v" th:text="${totalJudgers}">0</div><div class="k">NODES</div></div>
            </div>
        </section>

        <!-- JUDGER NODES -->
        <section class="vw-section">
            <div class="vw-section-label">// NODES</div>
            <div class="vw-jgrid">
                <div class="vw-jcard" th:each="node : ${judgers}"
                     th:classappend="${node.online} ? 'is-online' : 'is-offline'">
                    <div class="vw-jcard-head">
                        <span class="vw-jcard-dot" th:classappend="${node.online} ? 'on' : 'off'"></span>
                        <span class="vw-jcard-name" th:text="${node.username}">judger</span>
                        <span class="vw-jcard-status" th:classappend="${node.online} ? 'on' : 'off'"
                              th:text="${node.online} ? 'online' : 'offline'">status</span>
                    </div>
                    <th:block th:if="${node.online}">
                        <div class="vw-jcard-spec" th:text="${node.description}">8 vCPU &middot; 16 GB</div>
                        <div class="vw-bar" th:with="lvl=${node.cpuLoad >= 80 ? 'high' : (node.cpuLoad >= 60 ? 'mid' : 'low')}">
                            <div class="vw-bar-top"><span class="lbl">CPU LOAD</span><span th:classappend="|vw-load-${lvl}|" th:text="${node.cpuLoad} + '%'">0%</span></div>
                            <div class="vw-bar-track"><div class="vw-bar-fill" th:classappend="|vw-bar-${lvl}|" th:style="|width:${node.cpuLoad}%|"></div></div>
                        </div>
                        <div class="vw-bar">
                            <div class="vw-bar-top"><span class="lbl">MEMORY</span><span class="vw-muted2" th:text="${node.memoryUsage} + '%'">0%</span></div>
                            <div class="vw-bar-track"><div class="vw-bar-fill vw-bar-mem" th:style="|width:${node.memoryUsage}%|"></div></div>
                        </div>
                        <div class="vw-jcard-foot">
                            <span>uptime <b th:text="${node.uptime}">31d</b></span>
                        </div>
                    </th:block>
                    <th:block th:unless="${node.online}">
                        <div class="vw-jcard-spec">offline &middot; awaiting heartbeat</div>
                    </th:block>
                </div>
                <div class="vw-table-empty" th:if="${judgers == null or judgers.isEmpty()}">// no judgers registered</div>
            </div>
        </section>
    </div>
</body>
</html>
