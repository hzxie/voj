<!DOCTYPE html>
<!--/*
  Public site footer (terminal aesthetic). Used via ~{fragments/footer :: footer}.
  Reproduced from the design (Footer in every *.dc.html): a single copyright line,
  Judgers/About/Terms/Privacy/Help links, and a language dropdown. Styling lives in
  css/app.css (.vw-footer / .vw-footlinks / .vw-lang); the dropdown open/close and the
  ?language= locale switch are handled by js/theme.js.
*/-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
    <footer class="vw-footer" th:fragment="footer">
        <div class="vw-footer-inner">
            <span>
                <span class="vw-footer-prompt">verwandlung@oj:~$ </span>
                <span th:text="#{voj.include.footer.copyright}">Copyright</span> &copy;
                <span th:text="${#dates.year(#dates.createNow())}">2026</span>
                <span th:utext="${copyright}">Infinite Script</span>.
                <span class="vw-footer-icp" th:if="${icpNumber != null and icpNumber != ''}">
                    &middot; <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener" th:text="${icpNumber}">ICP</a>
                </span>
                <span class="vw-footer-icp" th:if="${policeIcpNumber != null and policeIcpNumber != ''}">
                    &middot; <a href="https://beian.mps.gov.cn/" target="_blank" rel="noopener" th:text="${policeIcpNumber}">Police ICP</a>
                </span>
            </span>
            <div class="vw-footlinks">
                <a th:href="@{/judgers}" th:text="#{voj.include.footer.judgers}">Judgers</a>
                <a th:href="@{/about}" th:text="#{voj.include.footer.about-us}">About</a>
                <a th:href="@{/terms}" th:text="#{voj.include.footer.terms}">Terms</a>
                <a th:href="@{/privacy}" th:text="#{voj.include.footer.privacy}">Privacy</a>
                <a th:href="@{/help}" th:text="#{voj.include.footer.help}">Help</a>
                <div class="vw-lang" data-vw="dropdown">
                    <button class="vw-lang-btn" data-vw="dropdown-btn" type="button" title="Language">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
                    </button>
                    <div class="vw-lang-menu">
                        <a href="javascript:void(0);" data-language="en_US" th:classappend="${language == 'en_US'}? 'active'">
                            <span>English</span><span th:if="${language == 'en_US'}">&#10003;</span>
                        </a>
                        <a href="javascript:void(0);" data-language="zh_CN" th:classappend="${language == 'zh_CN'}? 'active'">
                            <span>&#31616;&#20307;&#20013;&#25991;</span><span th:if="${language == 'zh_CN'}">&#10003;</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
