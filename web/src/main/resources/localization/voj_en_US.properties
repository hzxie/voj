# pages/about.html
voj.misc.about.title = About Us
voj.misc.about.eyebrow = About
voj.misc.about.hero-title = A judge that turns<br>source into a <span class="accent">verdict.</span>
voj.misc.about.hero-lead = Verwandlung is an open-source, cross-platform online judge built on Spring Boot and a distributed pool of judgers coordinated through ActiveMQ. It compiles, runs, and grades submissions against hidden test cases in sandboxed runners. It is the same engine behind every contest and practice problem on this site.
voj.misc.about.architecture = Architecture
voj.misc.about.arch-spring-boot-desc = Java backend serving problems, submissions and contests.
voj.misc.about.arch-activemq-desc = Message broker that distributes judge jobs across the judger pool.
voj.misc.about.arch-judgers-desc = Cross-platform sandboxed runners for Linux and Windows, under time and memory limits.
voj.misc.about.arch-mysql-desc = Persistent store for users, problems, test data and verdicts.
voj.misc.about.arch-mybatis-desc = SQL-mapping layer between the Spring services and the database.
voj.misc.about.arch-thymeleaf-desc = Server-rendered views with no heavyweight SPA framework.
voj.misc.about.milestones = Milestones
voj.misc.about.milestone-2014 = First commit, already with cross-platform judgers on Linux and Windows, rare among online judges.
voj.misc.about.milestone-2015 = ActiveMQ added, so the web app and judgers communicate over a message queue and judging can run across multiple machines.
voj.misc.about.milestone-2018 = Web and judger components containerized with Docker.
voj.misc.about.milestone-2023 = Upgraded to Spring 6 across both modules.
voj.misc.about.milestone-2026 = Rebuilt on Spring Boot 4 across the web and judger modules.
voj.misc.about.milestone-sandbox = Native Linux and Windows sandboxes replace the legacy runner.
voj.misc.about.milestone-redesign = A brand-new UI design across the whole site.
