voj.misc.privacy.privacy-and-cookie = Privacy &amp; Cookie
voj.misc.privacy.introduction-content = Your privacy is important to us and always has been. So we've developed a Privacy Policy that covers how we collect, use, disclose, transfer, and store your information. Please take a moment to familiarize yourself with our privacy practices and let us know if you have any questions.\n\nThis privacy statement applies to {0} websites, services and products that collect data and display these terms, as well as their offline product support services. It does not apply to {0} sites, services and products that do not display or link to this statement or that have their own privacy statements.
voj.misc.privacy.information-gathering-and-usage = Information Gathering and Usage
voj.misc.privacy.information-gathering-and-usage-content = When you register for {0} we ask for information such as your email address.\n\n{0} uses collected information for the following general purposes: products and services provision, identification and authentication, services improvement, and contact.\n\nAs is true of most internet services, we gather some information automatically and store it in log files. This information includes Internet Protocol (IP) addresses, browser type and language, Internet service provider (ISP), referring and exit websites and applications, operating system, date/time stamp, and clickstream data.
voj.misc.privacy.cookies = Cookies
voj.misc.privacy.cookies-content = - A cookie is a small amount of data, which often includes an anonymous unique identifier, that is sent to your browser from a web site's computers and stored on your computer's hard drive.\n- Cookies are required to use the {0} service.\n- We use cookies to record current session information, but do not use permanent cookies. You are required to re-login to your {0} account after a certain period of time has elapsed to protect you against others accidentally accessing your account contents.
voj.misc.privacy.information-protection = Protection of Personal Information
voj.misc.privacy.information-protection-content = {0} takes the security of your personal information very seriously. We recommend enabling encryption such as Transport Layer Security (TLS) to protect your personal information during transmission. When your personal data is stored by {0}, all of them will be encrypted using irreversible algorithm.\n\nWhen you use some {0} products, services, or applications or post on an {0} forum, or social networking service, the personal information and content you share is visible to other users and can be read, collected, or used by them. You are responsible for the personal information you choose to share or submit in these instances. For example, if you list your name and email address in a forum posting, that information is public. Please take care when using these features.
voj.misc.privacy.information-integrity-and-retention = Integrity and Retention of Personal Information
voj.misc.privacy.information-integrity-and-retention-content = {0} makes it easy for you to keep your personal information accurate, complete, and up to date. We will retain your personal information for the period necessary to fulfill the purposes outlined in this Privacy Policy unless a longer retention period is required or permitted by law.
voj.misc.privacy.information-access = Access to Personal Information
voj.misc.privacy.information-access-content = You can help ensure that your contact information and preferences are accurate, complete, and up to date by logging in to your account. For other personal information we hold, we will provide you with access for any purpose including to request that we correct the data if it is inaccurate or delete the data if {0} is not required to retain it by law or for legitimate business purposes. We may decline to process requests that are frivolous/vexatious, jeopardize the privacy of others, are extremely impractical, or for which access is not otherwise required by local law.
voj.misc.privacy.children = Children
voj.misc.privacy.children-content = When a {0} site or service collects age information, it will block users under 13 or obtain consent from a parent or guardian before their child can use it.\n\nWhen consent is granted, the child's account is treated much like any other account, including letting the account holder communicate with other users.\n\nParents can change or revoke consent as described in this privacy statement.
voj.misc.privacy.disclosure = Disclosure to Third Parties
voj.misc.privacy.disclosure-content = At times {0} may make certain personal information available to strategic partners that work with {0} to provide products and services. If you are approved for service, your account will be governed by {0}'s respective privacy policies. Personal information will only be shared by {0} to provide or improve our products and services; it will not be shared with third parties for their marketing purposes.\n\nIt may be necessary − by law, legal process, litigation, and/or requests from public and governmental authorities within or outside your country of residence − for {0} to disclose your personal information. We may also disclose information about you if we determine that for purposes of national security, law enforcement, or other issues of public importance, disclosure is necessary or appropriate.\n\nWe may also disclose information about you if we determine that disclosure is reasonably necessary to enforce our terms and conditions or protect our users. Additionally, in the event of a reorganization, merger, or sale we may transfer any and all personal information we collect to the relevant third party.
voj.misc.privacy.commitment = Commitment to Your Privacy
voj.misc.privacy.commitment-content = To make sure your personal information is secure, we'll strictly enforce privacy safeguards.
voj.misc.privacy.changes = Changes
voj.misc.privacy.changes-content = {0} may periodically update this policy. We will notify you about significant changes in the way we treat personal information by sending a notice to the email address of your account account or by placing a prominent notice on our site.

# misc/help.jsp
voj.misc.help.title = Help Center
voj.misc.help.help-and-support = Help and Support
voj.misc.help.browsers-support = Supported Browsers
voj.misc.help.browsers-support-content = **Please Note:** If you want to get real time judge result using Sever-Sent Event, Internet Explorer is not supported!\n\n- Internet Explorer 7 and higher version\n- Google Chrome 6.0 and higher version\n- Mozilla Firefox 6.0 and higher version\n- Apple Safari 5.0 and higher version\n- Opera 11.5 and higher version\n- Microsoft Edge 12 and higher version
voj.misc.help.input-and-output = Input and Output
voj.misc.help.input-and-output-content = Your program shall read input from stdin('Standard Input') and write output to stdout('Standard Output'). For example, you can use 'scanf' in C or 'cin' in C++ to read from stdin, and use 'printf' in C or 'cout' in C++ to write to stdout.
voj.misc.help.judge-results-meaning = Meaning of Judge Results
voj.misc.help.judge-results-meaning-content = - **Pending**: The judger is so busy that it can't judge your submit at the moment, usualy you just need to wait a minute and your submit will be judged.\n- **Accepted**: OK! Your program is correct!\n- **Wrong Answer**: Correct solution not reached for the inputs. The inputs and outputs that we use to test the programs are not public (it is recommendable to get accustomed to a true contest dynamic ;-).\n- **Time Limit Exceeded**: Your program tried to run during too much time.\n- **Memory Limit Exceeded**: Your program tried to use more memory than the judger settings.\n- **Output Limit Exceeded**: Your program tried to write too much information. This usually occurs if it goes into a infinite loop. Currently the output limit is 1M bytes.\n- **Runtime Error**: All the other Error on the running phrase will get Runtime Error, such as 'segmentation fault', 'floating point exception', 'used forbidden functions', 'tried to access forbidden memories' and so on.\n- **Presentation Error**: Your output format is not exactly the same as the judger's output, although your answer to the problem is correct. Check your output for spaces, blank lines, etc against the problem output specification.\n- **Compile Error**: The compiler (gcc, g++, fpc, etc) could not compile your program. Of course, warning messages are not error messages. The judger reply the actual error message.\n- **System Error**: Internal error occurred in the judger. Please [report this bug](https**://github.com/zjhzxhz/voj/issues) to us.
voj.misc.help.compile-error-reason = Reason for Compile Error
voj.misc.help.compile-error-content = For Java, the class name must be 'Main'.\n\nThere are some differences between GNU and MS-VC++, such as:\n\n- main must be declared as int, void main will end up with a Compile Error.\n- i is out of definition after block 'for (int i = 0...) {...}'.\n- itoa is not an ANSI function.\n- __int64 of VC is not ANSI, but you can use long long for 64-bit integer.\n

