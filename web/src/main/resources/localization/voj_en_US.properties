voj.misc.help.verdict-tle-desc = Too slow on a test
voj.misc.help.verdict-mle = Memory Limit
voj.misc.help.verdict-mle-desc = Exceeded memory cap
voj.misc.help.verdict-re = Runtime Error
voj.misc.help.verdict-re-desc = Crashed during run
voj.misc.help.verdict-ce = Compile Error
voj.misc.help.verdict-ce-desc = Source failed to build
voj.misc.help.faq = Frequently Asked
voj.misc.help.faq-group-getting-started = Getting Started
voj.misc.help.faq-group-judging = Judging & Verdicts
voj.misc.help.faq-group-contests = Contests
voj.misc.help.faq-group-account = Account
voj.misc.help.faq-q1 = How do I submit my first solution?
voj.misc.help.faq-a1 = Open a problem from ~/problems, choose a language in the editor, paste or type your code, and click submit. Your code is queued on the nearest judger and the verdict appears live as each test runs.
voj.misc.help.faq-q2 = Which languages are supported?
voj.misc.help.faq-a2 = The full, always up-to-date list is shown in the language selector on the submit panel. Each language has its own compiler flags and time-limit multiplier.
voj.misc.help.faq-q3 = Do I need an account to view problems?
voj.misc.help.faq-a3 = You can browse problem statements without an account, but you need to register to submit code, join contests, and appear on leaderboards.
voj.misc.help.faq-q4 = What do the verdict codes mean?
voj.misc.help.faq-a4 = See the verdict legend above. AC means every test passed; WA, TLE, MLE, RE and CE each point to a specific failure mode so you know where to look.
voj.misc.help.faq-q5 = Why is my solution getting TLE?
voj.misc.help.faq-a5 = Your program exceeded the time limit on at least one test. Profile your algorithm's complexity, avoid slow I/O, and check the per-test timing on the submission detail page to find the slow case.
voj.misc.help.faq-q6 = Can I see which test case failed?
voj.misc.help.faq-a6 = For practice problems, the submission detail page shows the first failing test number, runtime, and memory. Hidden test inputs themselves are not revealed.
voj.misc.help.faq-q7 = How fast is judging?
voj.misc.help.faq-a7 = Submissions are distributed across a judger cluster via ActiveMQ, with a median round-trip latency around 11ms. Heavy contest traffic may add a short queue.
voj.misc.help.faq-q8 = How do ACM and OI scoring differ?
voj.misc.help.faq-a8 = ACM ranks by problems solved with penalty time per wrong attempt. OI awards partial points per passed test group, so a partially correct solution still scores. Each contest states its mode on the detail page.
voj.misc.help.faq-q9 = Can I submit after a contest ends?
voj.misc.help.faq-a9 = Yes — problems move to the practice archive once a contest closes, so you can keep solving them. Those submissions do not affect the final standings.
voj.misc.help.faq-q10 = How do I reset my password?
voj.misc.help.faq-a10 = Use the "forgot password" link on the login page. A reset link is sent to your registered email; if it doesn't arrive, check spam or contact help@verwandlung.org.
voj.misc.help.faq-q11 = Can I change my username?
voj.misc.help.faq-a11 = Usernames are tied to your submission history and leaderboard entries, so changes are limited. Email support if you have a genuine need to rename.
