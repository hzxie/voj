voj.misc.terms.sec1-p1 = By accessing Verwandlung or creating an account, you agree to these Terms of Service and our Privacy Policy. If you do not agree, please do not use the platform.
voj.misc.terms.sec1-p2 = These terms apply to everyone who browses problems, submits code, joins contests, or posts on the discussion board — registered or not.
voj.misc.terms.sec2-p = You are responsible for the activity under your account and for keeping your password secure. One human, one account; automated or shared accounts may be suspended.
voj.misc.terms.sec2-li1 = Provide a valid email so we can deliver verdicts and security notices.
voj.misc.terms.sec2-li2 = You must be 13 or older to register, or have guardian consent.
voj.misc.terms.sec2-li3 = Notify us promptly if you suspect unauthorized access.
voj.misc.terms.sec3-p = Verwandlung is a learning and competition platform. Use it to practice, compete, and discuss algorithms in good faith.
voj.misc.terms.sec3-li1 = Do not attack, overload, or attempt to escape the judger sandbox.
voj.misc.terms.sec3-li2 = Do not exfiltrate hidden test data or probe other users' submissions.
voj.misc.terms.sec3-li3 = Do not post spam, malware, or content you have no right to share.
voj.misc.terms.sec4-p1 = You keep ownership of the source code you submit. By submitting, you grant Verwandlung a limited license to compile, execute, store, and grade it for the purpose of returning a verdict.
voj.misc.terms.sec4-p2 = We may retain submissions to power your profile statistics, contest standings, and plagiarism checks.
voj.misc.terms.sec5-p = Ranked contests are governed by their individual rules in addition to these terms. Cheating undermines everyone's effort and is taken seriously.
voj.misc.terms.sec5-li1 = No sharing solutions or accounts during a live contest.
voj.misc.terms.sec5-li2 = No multiple accounts to manipulate standings.
voj.misc.terms.sec5-li3 = Verdicts and penalties from the judging engine are final unless a rejudge is issued.
voj.misc.terms.sec6-p = The Verwandlung engine is open source under GPL-3.0. Problem statements, test data, and editorial content remain the property of their respective authors and may not be redistributed without permission.
voj.misc.terms.sec7-p = We run a distributed judger cluster and aim for high availability, but the service is provided on a best-effort basis. Maintenance, migrations, and outages may interrupt judging from time to time.
voj.misc.terms.sec8-p = Verwandlung is provided "as is" without warranties of any kind. We do not guarantee that verdicts, latencies, or standings will be free of error at all times.
voj.misc.terms.sec9-p = To the fullest extent permitted by law, Verwandlung and its maintainers are not liable for any indirect or consequential damages arising from your use of the platform, including lost contest standing or data.
voj.misc.terms.sec10-p = We may update these terms as the platform evolves. Material changes will be announced on the changelog and the effective date above will be revised. Continued use after changes means you accept them.
voj.misc.terms.sec11-p = Questions, disputes, or takedown requests can be sent to legal@verwandlung.org, or raised as an issue on the project's GitHub repository.
