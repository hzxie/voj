# pages/privacy.html
voj.misc.privacy.title = Privacy & Cookie
voj.misc.privacy.eyebrow = Privacy Policy
voj.misc.privacy.hero-title = Your data,<br>handled with <span class="accent">care.</span>
voj.misc.privacy.hero-lead = This policy explains what Verwandlung collects, why we collect it, and the control you have over it. We keep data to a minimum — only what judging, contests, and your profile actually need.
voj.misc.privacy.chip-effective = Effective
voj.misc.privacy.chip-gdpr-aligned = aligned
voj.misc.privacy.chip-read = ~4 min read
voj.misc.privacy.toc = Contents
voj.misc.privacy.sec1-title = Information We Collect
voj.misc.privacy.sec2-title = How We Use Information
voj.misc.privacy.sec3-title = Cookies & Local Storage
voj.misc.privacy.sec4-title = Code & Submission Data
voj.misc.privacy.sec5-title = Data Sharing
voj.misc.privacy.sec6-title = Data Retention
voj.misc.privacy.sec7-title = Security
voj.misc.privacy.sec8-title = Your Rights
voj.misc.privacy.sec9-title = Children's Privacy
voj.misc.privacy.sec10-title = Changes to This Policy
voj.misc.privacy.sec11-title = Contact
voj.misc.privacy.sec1-p = We collect only what the platform needs to function. There are no third-party advertising or tracking pixels on Verwandlung.
voj.misc.privacy.sec1-li1 = Account data — username, email, and a hashed password.
voj.misc.privacy.sec1-li2 = Submission data — your source code, language, verdict, runtime and memory.
voj.misc.privacy.sec1-li3 = Activity data — contest participation, discussion posts, and profile settings.
voj.misc.privacy.sec1-li4 = Technical data — IP address and browser agent, kept transiently for security.
voj.misc.privacy.sec2-p = Your data powers the core experience: compiling and grading code, building your profile statistics, ranking contest standings, and keeping the platform secure.
voj.misc.privacy.sec2-li1 = Return verdicts and deliver result notifications.
voj.misc.privacy.sec2-li2 = Compute leaderboards, ratings, and solved-problem history.
voj.misc.privacy.sec2-li3 = Detect abuse, plagiarism, and sandbox-escape attempts.
voj.misc.privacy.sec3-p = We use a session cookie to keep you logged in and browser local storage to remember preferences like your theme. We do not use cookies to track you across other sites.
voj.misc.privacy.sec4-p = Submitted source is stored so you can review it later and so we can run plagiarism comparisons. Code from hidden tests and contests is never sold or shared with advertisers.
voj.misc.privacy.sec5-p = We do not sell your personal data. Limited information is public by design — your username, rating, and accepted submissions appear on leaderboards and profiles.
voj.misc.privacy.sec5-li1 = Public: username, avatar, rating, and solved problems.
voj.misc.privacy.sec5-li2 = Private: email, IP address, and password hash.
voj.misc.privacy.sec5-li3 = We may disclose data only when legally required.
voj.misc.privacy.sec6-p = We keep account and submission data while your account is active. If you delete your account, personal identifiers are removed, though anonymized contest results may remain for standings integrity.
voj.misc.privacy.sec7-p = Passwords are salted and hashed, traffic is served over TLS, and judgers run in isolated sandboxes. No system is perfectly secure, but we work to protect your data and respond quickly to incidents.
voj.misc.privacy.sec8-p = You can access, export, correct, or delete your personal data at any time. Email privacy@verwandlung.org and we will respond within a reasonable period.
voj.misc.privacy.sec9-p = Verwandlung is not directed at children under 13. If you believe a child has registered without consent, contact us and we will remove the account.
voj.misc.privacy.sec10-p = We may update this policy as the platform changes. Material updates will be announced on the changelog and the effective date above will be revised.
voj.misc.privacy.sec11-p = Privacy questions and data requests can be sent to privacy@verwandlung.org, or raised as an issue on the project's GitHub repository.
voj.misc.privacy.contact-title = Want a copy of your data, or to delete it?
voj.misc.privacy.contact-desc-prefix = Email
voj.misc.privacy.contact-desc-suffix = and we'll handle your request.
