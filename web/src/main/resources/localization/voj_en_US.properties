# pages/help.html
voj.misc.help.title = Help Center
voj.misc.help.eyebrow = Help Center
voj.misc.help.hero-title = Stuck? <span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = Quick answers for submitting code, reading verdicts, and joining contests. Can't find it? The discussion board and maintainers are one click away.
voj.misc.help.quick-start = Quick Start
voj.misc.help.q1-title = Submit a solution
voj.misc.help.q1-desc = Open any problem, pick your language, paste your code, and hit submit. The verdict streams back in milliseconds.
voj.misc.help.q2-title = Read your verdict
voj.misc.help.q2-desc = Each test case shows a status, runtime, and memory. Click a submission to see per-test detail.
voj.misc.help.q3-title = Join a contest
voj.misc.help.q3-desc = Browse live and upcoming contests, register, and solve under ACM or OI scoring rules.
voj.misc.help.verdict-legend = Verdict Legend
voj.misc.help.verdict-ac = Accepted
