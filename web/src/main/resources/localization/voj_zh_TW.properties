voj.misc.help.verdict-re-desc = 執行中崩潰
voj.misc.help.verdict-ce = 編譯錯誤
voj.misc.help.verdict-ce-desc = 原始碼編譯失敗
voj.misc.help.faq = 常見問題
voj.misc.help.faq-group-getting-started = 入門
voj.misc.help.faq-group-judging = 評測與結果
voj.misc.help.faq-group-contests = 競賽
voj.misc.help.faq-group-account = 賬號
voj.misc.help.faq-q1 = 如何提交我的第一份解答？
voj.misc.help.faq-a1 = 從 ~/problems 開啟一道題，在編輯器中選擇語言，貼上或輸入程式碼，然後點選提交。你的程式碼會被排入最近的評測機佇列，隨著每個測試點的執行，結果會即時顯示。
voj.misc.help.faq-q2 = 支援哪些語言？
voj.misc.help.faq-a2 = 完整且即時更新的語言清單顯示在提交面板的語言選擇器中。每種語言都有各自的編譯引數和時間限制倍率。
voj.misc.help.faq-q3 = 檢視題目需要賬號嗎？
voj.misc.help.faq-a3 = 無需賬號即可瀏覽題面，但提交程式碼、參加競賽和登上排行榜需要註冊。
voj.misc.help.faq-q4 = 各評測結果程式碼是什麼意思？
voj.misc.help.faq-a4 = 參見上方的評測結果圖例。AC 表示所有測試點通過；WA、TLE、MLE、RE 和 CE 各自指向一種具體的失敗原因，便於你定位問題。
voj.misc.help.faq-q5 = 我的解答為什麼會 TLE？
voj.misc.help.faq-a5 = 你的程式在至少一個測試點上超過了時間限制。分析你演算法的複雜度，避免緩慢的 I/O，並在提交詳情頁檢視每個測試點的耗時，找出慢的那個用例。
voj.misc.help.faq-q6 = 我能看到是哪個測試點失敗了嗎？
voj.misc.help.faq-a6 = 對練習題，提交詳情頁會顯示第一個失敗的測試點編號、執行時間和記憶體。隱藏的測試輸入本身不會公開。
voj.misc.help.faq-q7 = 評測有多快？
voj.misc.help.faq-a7 = 提交通過 ActiveMQ 分發到評測機叢集，往返延遲中位數約 11 毫秒。競賽高峰期可能會有短暫排隊。
voj.misc.help.faq-q8 = ACM 和 OI 賽制有何不同？
voj.misc.help.faq-a8 = ACM 按解題數排名，每次錯誤嘗試計入罰時。OI 按通過的測試點分組給予部分分，因此部分正確的解答仍能得分。每場競賽都會在詳情頁註明其賽制。
voj.misc.help.faq-q9 = 競賽結束後還能提交嗎？
voj.misc.help.faq-a9 = 可以 —— 競賽結束後題目會進入練習區，你可以繼續解題。這些提交不影響最終排名。
voj.misc.help.faq-q10 = 如何重置密碼？
voj.misc.help.faq-a10 = 使用登入頁的“忘記密碼”連結。重置連結會發送到你註冊的郵箱；若未收到，請檢查垃圾郵件或聯絡 help@verwandlung.org。
voj.misc.help.faq-q11 = 我能修改使用者名稱嗎？
voj.misc.help.faq-a11 = 使用者名稱與你的提交歷史和排行榜記錄繫結，因此修改受限。如確有改名需要，請發郵件聯絡支援。
voj.misc.help.still-stuck = 仍未解決？
voj.misc.help.still-stuck-desc = 在討論區向社群提問
voj.misc.help.or-email = ，或發郵件至
