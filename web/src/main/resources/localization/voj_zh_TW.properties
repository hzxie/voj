voj.misc.terms.sec11-title = 聯絡我們
voj.misc.terms.sec1-p1 = 訪問 Verwandlung 或建立賬號，即表示你同意本服務條款及我們的隱私政策。若不同意，請勿使用本平臺。
voj.misc.terms.sec1-p2 = 無論是否註冊，本條款適用於所有瀏覽題目、提交程式碼、參加競賽或在討論區發帖的人。
voj.misc.terms.sec2-p = 你需對賬號下的活動負責，並妥善保管密碼。一人一號；自動化或共享賬號可能被封禁。
voj.misc.terms.sec2-li1 = 提供有效的郵箱，以便我們投遞評測結果和安全通知。
voj.misc.terms.sec2-li2 = 註冊需年滿 13 週歲，或已獲監護人同意。
voj.misc.terms.sec2-li3 = 如懷疑賬號被未授權訪問，請及時通知我們。
voj.misc.terms.sec3-p = Verwandlung 是學習與競賽平臺。請本著善意用它來練習、競賽和討論演算法。
voj.misc.terms.sec3-li1 = 不得攻擊、超載評測機，或試圖逃逸評測沙箱。
voj.misc.terms.sec3-li2 = 不得竊取隱藏測試資料，或窺探其他使用者的提交。
voj.misc.terms.sec3-li3 = 不得釋出垃圾資訊、惡意軟體，或你無權分享的內容。
voj.misc.terms.sec4-p1 = 你保留所提交原始碼的所有權。提交即表示你授予 Verwandlung 有限的許可，用於為返回評測結果而編譯、執行、儲存和評判你的程式碼。
voj.misc.terms.sec4-p2 = 我們可能保留提交記錄，用於生成你的個人統計、競賽排名和查重。
voj.misc.terms.sec5-p = 排名競賽除遵守本條款外，還受其各自規則約束。作弊會破壞所有人的努力，我們嚴肅對待。
voj.misc.terms.sec5-li1 = 競賽進行期間，不得分享題解或賬號。
voj.misc.terms.sec5-li2 = 不得使用多個賬號操縱排名。
voj.misc.terms.sec5-li3 = 除非發起重測，評測引擎給出的結果和罰時為最終結果。
voj.misc.terms.sec6-p = Verwandlung 引擎以 GPL-3.0 協議開源。題面、測試資料和題解內容歸各自作者所有，未經許可不得再分發。
voj.misc.terms.sec7-p = 我們執行分散式評測機叢集併力求高可用，但服務按“盡力而為”提供。維護、遷移和故障可能不時中斷評測。
voj.misc.terms.sec8-p = Verwandlung 按“現狀”提供，不作任何形式的擔保。我們不保證評測結果、延遲或排名在任何時刻都完全無誤。
voj.misc.terms.sec9-p = 在法律允許的最大範圍內，對於因使用本平臺而產生的任何間接或後果性損害（包括競賽排名或資料的丟失），Verwandlung 及其維護者概不負責。
voj.misc.terms.sec10-p = 我們可能隨平臺演進更新本條款。重大變更將在更新日誌中公告，上方的生效日期也會隨之修訂。變更後繼續使用即表示你接受變更。
voj.misc.terms.sec11-p = 有關問題、爭議或下架請求，可傳送至 legal@verwandlung.org，或在專案的 GitHub 倉庫提交 issue。
voj.misc.terms.contact-title = 對這些條款有疑問？
voj.misc.terms.contact-desc-prefix = 聯絡維護者：
voj.misc.terms.contact-desc-suffix = 或在 GitHub 上提交 issue。
voj.misc.terms.visit-help = 訪問幫助中心

# pages/privacy.html
voj.misc.privacy.title = 隱私和Cookie
voj.misc.privacy.eyebrow = 隱私政策
voj.misc.privacy.hero-title = 你的資料，<br>我們<span class="accent">悉心守護。</span>
voj.misc.privacy.hero-lead = 本政策說明 Verwandlung 收集哪些資訊、為何收集，以及你對這些資訊擁有的控制權。我們將資料保持最少 —— 只收集評測、競賽和你的個人資料真正需要的部分。
