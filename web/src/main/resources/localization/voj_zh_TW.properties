voj.misc.privacy.sec4-title = 程式碼與提交資料
voj.misc.privacy.sec5-title = 資料共享
voj.misc.privacy.sec6-title = 資料留存
voj.misc.privacy.sec7-title = 安全
voj.misc.privacy.sec8-title = 你的權利
voj.misc.privacy.sec9-title = 兒童隱私
voj.misc.privacy.sec10-title = 本政策的變更
voj.misc.privacy.sec11-title = 聯絡我們
voj.misc.privacy.sec1-p = 我們只收集平臺執行所必需的資訊。Verwandlung 上沒有任何第三方廣告或追蹤畫素。
voj.misc.privacy.sec1-li1 = 賬號資料 —— 使用者名稱、郵箱和經過雜湊處理的密碼。
voj.misc.privacy.sec1-li2 = 提交資料 —— 你的原始碼、語言、評測結果、執行時間和記憶體。
voj.misc.privacy.sec1-li3 = 活動資料 —— 競賽參與、討論發帖和個人資料設定。
voj.misc.privacy.sec1-li4 = 技術資料 —— IP 地址和瀏覽器代理，出於安全目的臨時保留。
voj.misc.privacy.sec2-p = 你的資料驅動核心體驗：編譯與評判程式碼、生成你的個人統計、計算競賽排名，並保障平臺安全。
voj.misc.privacy.sec2-li1 = 返回評測結果並推送結果通知。
voj.misc.privacy.sec2-li2 = 計算排行榜、評分和解題歷史。
voj.misc.privacy.sec2-li3 = 檢測濫用、抄襲和沙箱逃逸行為。
voj.misc.privacy.sec3-p = 我們使用會話 Cookie 讓你保持登入，並用瀏覽器本地儲存記住主題等偏好。我們不會用 Cookie 跨站追蹤你。
voj.misc.privacy.sec4-p = 提交的原始碼會被儲存，方便你日後檢視，也便於我們進行查重。隱藏測試和競賽中的程式碼絕不會被出售或分享給廣告商。
voj.misc.privacy.sec5-p = 我們不會出售你的個人資料。部分資訊按設計是公開的 —— 你的使用者名稱、評分和通過的提交會顯示在排行榜和個人主頁上。
voj.misc.privacy.sec5-li1 = 公開：使用者名稱、頭像、評分和已解決的題目。
voj.misc.privacy.sec5-li2 = 私密：郵箱、IP 地址和密碼雜湊。
voj.misc.privacy.sec5-li3 = 僅在法律要求時，我們才會披露資料。
voj.misc.privacy.sec6-p = 賬號有效期間，我們會保留賬號和提交資料。如果你刪除賬號，個人標識資訊會被移除，但為保證排名完整性，匿名化的競賽成績可能會保留。
voj.misc.privacy.sec7-p = 密碼經加鹽雜湊處理，流量通過 TLS 傳輸，評測機在隔離沙箱中執行。沒有系統是絕對安全的，但我們會努力保護你的資料並迅速響應安全事件。
voj.misc.privacy.sec8-p = 你可以隨時訪問、匯出、更正或刪除你的個人資料。傳送郵件至 privacy@verwandlung.org，我們將在合理期限內回覆。
voj.misc.privacy.sec9-p = Verwandlung 不面向 13 歲以下的兒童。若你認為有兒童未經同意註冊，請聯絡我們，我們會刪除該賬號。
voj.misc.privacy.sec10-p = 我們可能隨平臺變化更新本政策。重大更新將在更新日誌中公告，上方的生效日期也會隨之修訂。
voj.misc.privacy.sec11-p = 隱私相關問題和資料請求可傳送至 privacy@verwandlung.org，或在專案的 GitHub 倉庫提交 issue。
