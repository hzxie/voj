# pages/help.html
voj.misc.help.title = 幫助中心
voj.misc.help.eyebrow = 幫助中心
voj.misc.help.hero-title = 遇到問題？<span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = 關於提交程式碼、讀懂評測結果和參加競賽的快速解答。找不到答案？討論區和維護者觸手可及。
voj.misc.help.quick-start = 快速上手
voj.misc.help.q1-title = 提交一份解答
voj.misc.help.q1-desc = 開啟任意題目，選擇語言，貼上程式碼，點選提交。評測結果會在毫秒間返回。
voj.misc.help.q2-title = 讀懂你的評測結果
voj.misc.help.q2-desc = 每個測試點都會顯示狀態、執行時間和記憶體。點選某次提交可檢視每個測試點的詳情。
voj.misc.help.q3-title = 參加競賽
voj.misc.help.q3-desc = 瀏覽進行中和即將開始的競賽，報名，並在 ACM 或 OI 賽制下解題。
