# pages/about.html
voj.misc.about.title = 關於我們
voj.misc.about.eyebrow = 關於
voj.misc.about.hero-title = 把原始碼<br>化為<span class="accent">評測結果。</span>
voj.misc.about.hero-lead = Verwandlung 是一個開源、跨平臺的線上評測系統，基於 Spring Boot 構建，並通過 ActiveMQ 協調一組分散式評測機。它在沙箱執行器中針對隱藏測試用例編譯、執行並評判提交。本站每一場競賽和每一道練習題背後都是同一個引擎。
voj.misc.about.architecture = 架構
voj.misc.about.arch-spring-boot-desc = 提供題目、提交和競賽服務的 Java 後端。
voj.misc.about.arch-activemq-desc = 在評測機叢集間分發評測任務的訊息中介軟體。
voj.misc.about.arch-judgers-desc = 面向 Linux 和 Windows 的跨平臺沙箱執行器，受時間和記憶體限制約束。
voj.misc.about.arch-mysql-desc = 使用者、題目、測試資料和評測結果的持久化儲存。
voj.misc.about.arch-mybatis-desc = Spring 服務與資料庫之間的 SQL 對映層。
voj.misc.about.arch-thymeleaf-desc = 服務端渲染檢視，不依賴重量級 SPA 框架。
voj.misc.about.milestones = 里程碑
voj.misc.about.milestone-2014 = 首次提交，便已支援 Linux 和 Windows 上的跨平臺評測機，這在線上評測系統中並不多見。
voj.misc.about.milestone-2015 = 引入 ActiveMQ，使 Web 應用與評測機通過訊息佇列通訊，評測得以在多臺機器上執行。
voj.misc.about.milestone-2018 = Web 與評測機元件實現 Docker 容器化。
voj.misc.about.milestone-2023 = 兩個模組均升級至 Spring 6。
voj.misc.about.milestone-2026 = Web 與評測機模組均基於 Spring Boot 4 重建。
voj.misc.about.milestone-sandbox = 原生 Linux 和 Windows 沙箱取代舊版執行器。
voj.misc.about.milestone-redesign = 全站煥然一新的 UI 設計。
