# pages/terms.html
voj.misc.terms.title = Điều khoản sử dụng
voj.misc.terms.eyebrow = Điều khoản dịch vụ
voj.misc.terms.hero-title = Những điều khoản chi tiết,<br>bỏ qua <span class="accent">thuật ngữ rối rắm.</span>
voj.misc.terms.hero-lead = Các điều khoản này điều chỉnh việc bạn sử dụng Verwandlung — các bài tập, kỳ thi, bộ máy chấm và bảng thảo luận. Ngôn ngữ dễ hiểu, không bất ngờ. Khi tạo tài khoản hoặc nộp mã, bạn đồng ý với những nội dung sau.
voj.misc.terms.chip-effective = Hiệu lực
voj.misc.terms.chip-version = Phiên bản
voj.misc.terms.chip-read = đọc khoảng 4 phút
voj.misc.terms.toc = Mục lục
voj.misc.terms.sec1-title = Chấp nhận điều khoản
voj.misc.terms.sec2-title = Tài khoản & Điều kiện
voj.misc.terms.sec3-title = Sử dụng hợp lệ
voj.misc.terms.sec4-title = Bài nộp & Quyền sở hữu mã
voj.misc.terms.sec5-title = Kỳ thi & Thi đấu công bằng
voj.misc.terms.sec6-title = Sở hữu trí tuệ
voj.misc.terms.sec7-title = Tính khả dụng của dịch vụ
voj.misc.terms.sec8-title = Tuyên bố miễn trừ bảo đảm
voj.misc.terms.sec9-title = Giới hạn trách nhiệm
voj.misc.terms.sec10-title = Thay đổi các điều khoản này
voj.misc.terms.sec11-title = Liên hệ
voj.misc.terms.sec1-p1 = Bằng việc truy cập Verwandlung hoặc tạo tài khoản, bạn đồng ý với Điều khoản dịch vụ và Chính sách quyền riêng tư của chúng tôi. Nếu bạn không đồng ý, vui lòng không sử dụng nền tảng.
voj.misc.terms.sec1-p2 = Các điều khoản này áp dụng cho mọi người duyệt bài tập, nộp mã, tham gia kỳ thi hoặc đăng bài trên bảng thảo luận — dù đã đăng ký hay chưa.
voj.misc.terms.sec2-p = Bạn chịu trách nhiệm về hoạt động dưới tài khoản của mình và việc giữ mật khẩu an toàn. Mỗi người một tài khoản; các tài khoản tự động hoặc dùng chung có thể bị đình chỉ.
voj.misc.terms.sec2-li1 = Cung cấp email hợp lệ để chúng tôi gửi kết quả và thông báo bảo mật.
voj.misc.terms.sec2-li2 = Bạn phải từ 13 tuổi trở lên để đăng ký, hoặc có sự đồng ý của người giám hộ.
voj.misc.terms.sec2-li3 = Thông báo ngay cho chúng tôi nếu bạn nghi ngờ có truy cập trái phép.
voj.misc.terms.sec3-p = Verwandlung là nền tảng học tập và thi đấu. Hãy dùng nó để luyện tập, thi đấu và thảo luận thuật toán một cách thiện chí.
voj.misc.terms.sec3-li1 = Không tấn công, gây quá tải hoặc cố thoát khỏi sandbox của máy chấm.
voj.misc.terms.sec3-li2 = Không trích xuất dữ liệu test ẩn hoặc dò xét bài nộp của người dùng khác.
voj.misc.terms.sec3-li3 = Không đăng spam, mã độc hoặc nội dung bạn không có quyền chia sẻ.
voj.misc.terms.sec4-p1 = Bạn giữ quyền sở hữu mã nguồn mình nộp. Bằng việc nộp, bạn cấp cho Verwandlung một giấy phép hạn chế để biên dịch, chạy, lưu trữ và chấm điểm nhằm mục đích trả về kết quả.
voj.misc.terms.sec4-p2 = Chúng tôi có thể giữ lại các bài nộp để phục vụ thống kê hồ sơ, bảng xếp hạng kỳ thi và kiểm tra đạo văn.
voj.misc.terms.sec5-p = Các kỳ thi có xếp hạng tuân theo quy tắc riêng của từng kỳ ngoài các điều khoản này. Gian lận làm tổn hại công sức của mọi người và được xử lý nghiêm túc.
voj.misc.terms.sec5-li1 = Không chia sẻ lời giải hay tài khoản trong lúc kỳ thi đang diễn ra.
voj.misc.terms.sec5-li2 = Không dùng nhiều tài khoản để thao túng bảng xếp hạng.
voj.misc.terms.sec5-li3 = Kết quả và hình phạt từ bộ máy chấm là cuối cùng, trừ khi có lệnh chấm lại.
voj.misc.terms.sec6-p = Bộ máy Verwandlung là mã nguồn mở theo GPL-3.0. Đề bài, dữ liệu test và nội dung lời giải vẫn thuộc về các tác giả tương ứng và không được phân phối lại nếu không có sự cho phép.
voj.misc.terms.sec7-p = Chúng tôi vận hành một cụm máy chấm phân tán và hướng tới tính khả dụng cao, nhưng dịch vụ được cung cấp trên cơ sở nỗ lực tối đa. Bảo trì, di chuyển và sự cố có thể làm gián đoạn việc chấm bài đôi lúc.
voj.misc.terms.sec8-p = Verwandlung được cung cấp "nguyên trạng" mà không có bất kỳ bảo đảm nào. Chúng tôi không bảo đảm rằng kết quả, độ trễ hay bảng xếp hạng luôn không có lỗi.
voj.misc.terms.sec9-p = Trong phạm vi tối đa pháp luật cho phép, Verwandlung và những người duy trì không chịu trách nhiệm về bất kỳ thiệt hại gián tiếp hay hệ quả nào phát sinh từ việc bạn sử dụng nền tảng, bao gồm mất thứ hạng kỳ thi hoặc dữ liệu.
voj.misc.terms.sec10-p = Chúng tôi có thể cập nhật các điều khoản này khi nền tảng phát triển. Các thay đổi quan trọng sẽ được thông báo trong nhật ký thay đổi và ngày hiệu lực ở trên sẽ được điều chỉnh. Việc tiếp tục sử dụng sau khi thay đổi nghĩa là bạn chấp nhận chúng.
voj.misc.terms.sec11-p = Câu hỏi, tranh chấp hoặc yêu cầu gỡ bỏ có thể gửi tới legal@verwandlung.org, hoặc nêu thành một issue trên kho GitHub của dự án.
voj.misc.terms.contact-title = Có thắc mắc về các điều khoản này?
voj.misc.terms.contact-desc-prefix = Liên hệ những người duy trì tại
voj.misc.terms.contact-desc-suffix = hoặc mở một issue trên GitHub.
voj.misc.terms.visit-help = Tới Trung tâm trợ giúp

# pages/privacy.html
voj.misc.privacy.title = Quyền riêng tư & Cookie
voj.misc.privacy.eyebrow = Chính sách quyền riêng tư
voj.misc.privacy.hero-title = Dữ liệu của bạn,<br>được xử lý <span class="accent">cẩn trọng.</span>
voj.misc.privacy.hero-lead = Chính sách này giải thích Verwandlung thu thập gì, vì sao thu thập và quyền kiểm soát bạn có đối với chúng. Chúng tôi giữ dữ liệu ở mức tối thiểu — chỉ những gì việc chấm bài, kỳ thi và hồ sơ của bạn thực sự cần.
voj.misc.privacy.chip-effective = Hiệu lực
voj.misc.privacy.chip-gdpr-aligned = tuân thủ
voj.misc.privacy.chip-read = đọc khoảng 4 phút
voj.misc.privacy.toc = Mục lục
voj.misc.privacy.sec1-title = Thông tin chúng tôi thu thập
voj.misc.privacy.sec2-title = Cách chúng tôi dùng thông tin
voj.misc.privacy.sec3-title = Cookie & Bộ nhớ cục bộ
voj.misc.privacy.sec4-title = Mã & Dữ liệu bài nộp
voj.misc.privacy.sec5-title = Chia sẻ dữ liệu
voj.misc.privacy.sec6-title = Lưu giữ dữ liệu
voj.misc.privacy.sec7-title = Bảo mật
voj.misc.privacy.sec8-title = Quyền của bạn
voj.misc.privacy.sec9-title = Quyền riêng tư của trẻ em
voj.misc.privacy.sec10-title = Thay đổi chính sách này
voj.misc.privacy.sec11-title = Liên hệ
voj.misc.privacy.sec1-p = Chúng tôi chỉ thu thập những gì nền tảng cần để hoạt động. Verwandlung không có quảng cáo của bên thứ ba hay pixel theo dõi.
voj.misc.privacy.sec1-li1 = Dữ liệu tài khoản — tên đăng nhập, email và mật khẩu đã băm.
voj.misc.privacy.sec1-li2 = Dữ liệu bài nộp — mã nguồn, ngôn ngữ, kết quả, thời gian chạy và bộ nhớ.
voj.misc.privacy.sec1-li3 = Dữ liệu hoạt động — tham gia kỳ thi, bài đăng thảo luận và cài đặt hồ sơ.
voj.misc.privacy.sec1-li4 = Dữ liệu kỹ thuật — địa chỉ IP và thông tin trình duyệt, giữ tạm thời để bảo mật.
voj.misc.privacy.sec2-p = Dữ liệu của bạn vận hành trải nghiệm cốt lõi: biên dịch và chấm mã, xây dựng thống kê hồ sơ, xếp hạng kỳ thi và giữ nền tảng an toàn.
voj.misc.privacy.sec2-li1 = Trả về kết quả và gửi thông báo kết quả.
voj.misc.privacy.sec2-li2 = Tính bảng xếp hạng, rating và lịch sử bài đã giải.
voj.misc.privacy.sec2-li3 = Phát hiện lạm dụng, đạo văn và mưu toan thoát sandbox.
voj.misc.privacy.sec3-p = Chúng tôi dùng cookie phiên để giữ bạn đăng nhập và bộ nhớ cục bộ của trình duyệt để ghi nhớ các tùy chọn như giao diện. Chúng tôi không dùng cookie để theo dõi bạn trên các trang khác.
voj.misc.privacy.sec4-p = Mã nguồn đã nộp được lưu để bạn có thể xem lại sau và để chúng tôi chạy so sánh đạo văn. Mã từ các test ẩn và kỳ thi không bao giờ bị bán hay chia sẻ với nhà quảng cáo.
voj.misc.privacy.sec5-p = Chúng tôi không bán dữ liệu cá nhân của bạn. Một số thông tin được công khai theo thiết kế — tên đăng nhập, rating và các bài nộp được chấp nhận của bạn xuất hiện trên bảng xếp hạng và hồ sơ.
voj.misc.privacy.sec5-li1 = Công khai: tên đăng nhập, ảnh đại diện, rating và các bài đã giải.
voj.misc.privacy.sec5-li2 = Riêng tư: email, địa chỉ IP và mã băm mật khẩu.
voj.misc.privacy.sec5-li3 = Chúng tôi chỉ tiết lộ dữ liệu khi pháp luật yêu cầu.
voj.misc.privacy.sec6-p = Chúng tôi giữ dữ liệu tài khoản và bài nộp khi tài khoản của bạn còn hoạt động. Nếu bạn xóa tài khoản, các định danh cá nhân sẽ bị xóa, song kết quả kỳ thi đã ẩn danh có thể được giữ lại để bảo toàn tính toàn vẹn của bảng xếp hạng.
voj.misc.privacy.sec7-p = Mật khẩu được thêm muối và băm, lưu lượng được phục vụ qua TLS, và các máy chấm chạy trong sandbox cách ly. Không hệ thống nào an toàn tuyệt đối, nhưng chúng tôi nỗ lực bảo vệ dữ liệu của bạn và phản ứng nhanh với sự cố.
voj.misc.privacy.sec8-p = Bạn có thể truy cập, xuất, chỉnh sửa hoặc xóa dữ liệu cá nhân bất cứ lúc nào. Gửi email tới privacy@verwandlung.org và chúng tôi sẽ phản hồi trong thời gian hợp lý.
voj.misc.privacy.sec9-p = Verwandlung không hướng tới trẻ em dưới 13 tuổi. Nếu bạn cho rằng một trẻ đã đăng ký mà không có sự đồng ý, hãy liên hệ chúng tôi và chúng tôi sẽ xóa tài khoản.
voj.misc.privacy.sec10-p = Chúng tôi có thể cập nhật chính sách này khi nền tảng thay đổi. Các cập nhật quan trọng sẽ được thông báo trong nhật ký thay đổi và ngày hiệu lực ở trên sẽ được điều chỉnh.
voj.misc.privacy.sec11-p = Câu hỏi về quyền riêng tư và yêu cầu dữ liệu có thể gửi tới privacy@verwandlung.org, hoặc nêu thành một issue trên kho GitHub của dự án.
voj.misc.privacy.contact-title = Muốn lấy bản sao dữ liệu của bạn, hoặc xóa nó?
voj.misc.privacy.contact-desc-prefix = Gửi email
voj.misc.privacy.contact-desc-suffix = và chúng tôi sẽ xử lý yêu cầu của bạn.
