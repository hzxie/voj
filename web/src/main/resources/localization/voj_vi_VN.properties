voj.misc.help.faq-group-account = Tài khoản
voj.misc.help.faq-q1 = Tôi nộp lời giải đầu tiên thế nào?
voj.misc.help.faq-a1 = Mở một bài tập từ ~/problems, chọn ngôn ngữ trong trình soạn thảo, dán hoặc gõ mã của bạn và nhấp nộp. Mã của bạn được xếp hàng đợi trên máy chấm gần nhất và kết quả hiện trực tiếp khi từng test chạy.
voj.misc.help.faq-q2 = Hỗ trợ những ngôn ngữ nào?
voj.misc.help.faq-a2 = Danh sách đầy đủ, luôn cập nhật, hiển thị trong bộ chọn ngôn ngữ ở bảng nộp bài. Mỗi ngôn ngữ có cờ trình biên dịch và hệ số giới hạn thời gian riêng.
voj.misc.help.faq-q3 = Tôi có cần tài khoản để xem bài tập không?
voj.misc.help.faq-a3 = Bạn có thể duyệt đề bài mà không cần tài khoản, nhưng cần đăng ký để nộp mã, tham gia kỳ thi và xuất hiện trên bảng xếp hạng.
voj.misc.help.faq-q4 = Các mã kết quả nghĩa là gì?
voj.misc.help.faq-a4 = Xem chú giải kết quả ở trên. AC nghĩa là mọi test đều đạt; WA, TLE, MLE, RE và CE mỗi mã chỉ ra một kiểu lỗi cụ thể để bạn biết cần xem ở đâu.
voj.misc.help.faq-q5 = Vì sao lời giải của tôi bị TLE?
voj.misc.help.faq-a5 = Chương trình của bạn vượt giới hạn thời gian ở ít nhất một test. Hãy xem lại độ phức tạp của thuật toán, tránh I/O chậm, và kiểm tra thời gian từng test trên trang chi tiết bài nộp để tìm trường hợp chậm.
voj.misc.help.faq-q6 = Tôi có thể biết test nào bị sai không?
voj.misc.help.faq-a6 = Với các bài luyện tập, trang chi tiết bài nộp hiển thị số thứ tự test đầu tiên bị sai, thời gian chạy và bộ nhớ. Bản thân đầu vào của test ẩn thì không được tiết lộ.
voj.misc.help.faq-q7 = Chấm bài nhanh đến đâu?
voj.misc.help.faq-a7 = Bài nộp được phân tán qua ActiveMQ tới một cụm máy chấm, với độ trễ khứ hồi trung vị khoảng 11ms. Lưu lượng kỳ thi lớn có thể thêm một hàng đợi ngắn.
voj.misc.help.faq-q8 = Tính điểm ACM và OI khác nhau thế nào?
voj.misc.help.faq-a8 = ACM xếp hạng theo số bài giải được với thời gian phạt cho mỗi lần thử sai. OI cho điểm thành phần theo từng nhóm test đạt, nên một lời giải đúng một phần vẫn có điểm. Mỗi kỳ thi nêu rõ thể thức của mình trên trang chi tiết.
voj.misc.help.faq-q9 = Tôi có thể nộp sau khi kỳ thi kết thúc không?
voj.misc.help.faq-a9 = Có — các bài tập chuyển sang kho luyện tập khi kỳ thi đóng, nên bạn có thể tiếp tục giải. Những bài nộp đó không ảnh hưởng tới bảng xếp hạng cuối cùng.
voj.misc.help.faq-q10 = Tôi đặt lại mật khẩu thế nào?
voj.misc.help.faq-a10 = Dùng liên kết "quên mật khẩu" trên trang đăng nhập. Một liên kết đặt lại được gửi tới email đã đăng ký; nếu không thấy, hãy kiểm tra thư rác hoặc liên hệ help@verwandlung.org.
voj.misc.help.faq-q11 = Tôi có thể đổi tên đăng nhập không?
voj.misc.help.faq-a11 = Tên đăng nhập gắn với lịch sử bài nộp và các mục trên bảng xếp hạng, nên việc đổi bị hạn chế. Hãy gửi email cho bộ phận hỗ trợ nếu bạn thực sự cần đổi tên.
