# pages/about.html
voj.misc.about.title = Giới thiệu
voj.misc.about.eyebrow = Giới thiệu
voj.misc.about.hero-title = Một hệ thống biến<br>mã nguồn thành <span class="accent">kết quả.</span>
voj.misc.about.hero-lead = Verwandlung là một hệ thống chấm bài trực tuyến mã nguồn mở, đa nền tảng, xây dựng trên Spring Boot và một nhóm máy chấm phân tán phối hợp qua ActiveMQ. Nó biên dịch, chạy và chấm các bài nộp trên các bộ test ẩn trong các runner sandbox. Đây chính là bộ máy đứng sau mọi kỳ thi và bài luyện tập trên trang này.
voj.misc.about.architecture = Kiến trúc
voj.misc.about.arch-spring-boot-desc = Backend Java phục vụ bài tập, bài nộp và kỳ thi.
voj.misc.about.arch-activemq-desc = Message broker phân phối các tác vụ chấm trên khắp nhóm máy chấm.
voj.misc.about.arch-judgers-desc = Các runner sandbox đa nền tảng cho Linux và Windows, dưới giới hạn thời gian và bộ nhớ.
voj.misc.about.arch-mysql-desc = Kho lưu trữ bền vững cho người dùng, bài tập, dữ liệu test và kết quả.
voj.misc.about.arch-mybatis-desc = Lớp ánh xạ SQL giữa các service Spring và cơ sở dữ liệu.
voj.misc.about.arch-thymeleaf-desc = Các view dựng phía máy chủ, không dùng framework SPA nặng nề.
voj.misc.about.milestones = Cột mốc
voj.misc.about.milestone-2014 = Commit đầu tiên, đã có sẵn các máy chấm đa nền tảng trên Linux và Windows, điều hiếm thấy ở các hệ thống chấm bài trực tuyến.
voj.misc.about.milestone-2015 = Thêm ActiveMQ, để ứng dụng web và các máy chấm giao tiếp qua một hàng đợi tin nhắn và việc chấm có thể chạy trên nhiều máy.
voj.misc.about.milestone-2018 = Đóng gói container các thành phần web và máy chấm bằng Docker.
voj.misc.about.milestone-2023 = Nâng cấp lên Spring 6 trên cả hai module.
voj.misc.about.milestone-2026 = Tái dựng trên Spring Boot 4 trên cả module web và máy chấm.
voj.misc.about.milestone-sandbox = Các sandbox Linux và Windows native thay thế runner cũ.
voj.misc.about.milestone-redesign = Một thiết kế giao diện hoàn toàn mới trên toàn bộ trang.
