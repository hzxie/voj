# pages/help.html
voj.misc.help.title = Trung tâm trợ giúp
voj.misc.help.eyebrow = Trung tâm trợ giúp
voj.misc.help.hero-title = Bí rồi? <span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = Giải đáp nhanh về nộp mã, đọc kết quả và tham gia kỳ thi. Không tìm thấy? Bảng thảo luận và những người duy trì chỉ cách một cú nhấp.
voj.misc.help.quick-start = Bắt đầu nhanh
voj.misc.help.q1-title = Nộp một lời giải
voj.misc.help.q1-desc = Mở bất kỳ bài tập nào, chọn ngôn ngữ, dán mã của bạn và nhấn nộp. Kết quả truyền về trong mili giây.
voj.misc.help.q2-title = Đọc kết quả của bạn
