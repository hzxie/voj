# pages/about.html
voj.misc.about.title = 소개
voj.misc.about.eyebrow = 소개
voj.misc.about.hero-title = 소스를 <br><span class="accent">판정</span>으로 바꾸는 저지.
voj.misc.about.hero-lead = Verwandlung은 Spring Boot와 ActiveMQ로 조율되는 분산 채점기 풀 위에 구축된 오픈소스 크로스플랫폼 온라인 저지입니다. 격리된 러너에서 제출물을 컴파일·실행하고 숨겨진 테스트 케이스에 대해 채점합니다. 이 사이트의 모든 대회와 연습 문제를 뒷받침하는 바로 그 엔진입니다.
voj.misc.about.architecture = 아키텍처
voj.misc.about.arch-spring-boot-desc = 문제, 제출, 대회를 제공하는 Java 백엔드.
voj.misc.about.arch-activemq-desc = 채점기 풀 전반에 채점 작업을 분산하는 메시지 브로커.
voj.misc.about.arch-judgers-desc = 시간과 메모리 제한 하에서 동작하는 Linux·Windows용 크로스플랫폼 격리 러너.
voj.misc.about.arch-mysql-desc = 사용자, 문제, 테스트 데이터, 판정의 영구 저장소.
voj.misc.about.arch-mybatis-desc = Spring 서비스와 데이터베이스 사이의 SQL 매핑 계층.
voj.misc.about.arch-thymeleaf-desc = 무거운 SPA 프레임워크 없이 서버에서 렌더링하는 뷰.
voj.misc.about.milestones = 마일스톤
voj.misc.about.milestone-2014 = 첫 커밋. 당초부터 온라인 저지에서는 드물게 Linux·Windows 크로스플랫폼 채점기를 갖추고 있었습니다.
voj.misc.about.milestone-2015 = ActiveMQ를 추가하여 웹 앱과 채점기가 메시지 큐로 통신하고 여러 머신에서 채점을 실행할 수 있게 되었습니다.
voj.misc.about.milestone-2018 = 웹과 채점기 컴포넌트를 Docker로 컨테이너화.
voj.misc.about.milestone-2023 = 두 모듈을 Spring 6으로 업그레이드.
voj.misc.about.milestone-2026 = 웹과 채점기 모듈을 Spring Boot 4로 재구축.
voj.misc.about.milestone-sandbox = 네이티브 Linux·Windows 샌드박스가 기존 러너를 대체.
voj.misc.about.milestone-redesign = 사이트 전체의 완전히 새로운 UI 디자인.
