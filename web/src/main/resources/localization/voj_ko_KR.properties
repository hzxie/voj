voj.misc.privacy.sec1-p = 플랫폼이 작동하는 데 필요한 것만 수집합니다. Verwandlung에는 제3자 광고나 추적 픽셀이 없습니다.
voj.misc.privacy.sec1-li1 = 계정 데이터 — 사용자 이름, 이메일, 해시된 비밀번호.
voj.misc.privacy.sec1-li2 = 제출 데이터 — 소스 코드, 언어, 판정, 실행 시간, 메모리.
voj.misc.privacy.sec1-li3 = 활동 데이터 — 대회 참가, 토론 게시물, 프로필 설정.
voj.misc.privacy.sec1-li4 = 기술 데이터 — 보안을 위해 일시적으로 보관하는 IP 주소와 브라우저 정보.
voj.misc.privacy.sec2-p = 당신의 데이터는 핵심 경험을 뒷받침합니다: 코드 컴파일과 채점, 프로필 통계 작성, 대회 순위 매기기, 플랫폼 보안 유지.
voj.misc.privacy.sec2-li1 = 판정을 돌려주고 결과 알림을 전달합니다.
voj.misc.privacy.sec2-li2 = 순위표, 레이팅, 해결한 문제 기록을 계산합니다.
voj.misc.privacy.sec2-li3 = 악용, 표절, 샌드박스 탈출 시도를 탐지합니다.
voj.misc.privacy.sec3-p = 로그인 상태를 유지하기 위해 세션 쿠키를, 테마 같은 환경설정을 기억하기 위해 브라우저 로컬 저장소를 사용합니다. 다른 사이트를 넘나들며 당신을 추적하기 위해 쿠키를 사용하지 않습니다.
voj.misc.privacy.sec4-p = 제출된 소스는 나중에 다시 볼 수 있도록, 그리고 표절 비교를 실행할 수 있도록 저장됩니다. 숨겨진 테스트와 대회의 코드는 결코 판매되거나 광고주와 공유되지 않습니다.
voj.misc.privacy.sec5-p = 개인 데이터를 판매하지 않습니다. 일부 정보는 설계상 공개됩니다 — 사용자 이름, 레이팅, 정답 제출은 순위표와 프로필에 표시됩니다.
voj.misc.privacy.sec5-li1 = 공개: 사용자 이름, 아바타, 레이팅, 해결한 문제.
voj.misc.privacy.sec5-li2 = 비공개: 이메일, IP 주소, 비밀번호 해시.
voj.misc.privacy.sec5-li3 = 법적으로 요구되는 경우에만 데이터를 공개할 수 있습니다.
voj.misc.privacy.sec6-p = 계정이 활성 상태인 동안 계정과 제출 데이터를 보관합니다. 계정을 삭제하면 개인 식별 정보는 제거되지만, 순위의 무결성을 위해 익명화된 대회 결과는 남을 수 있습니다.
voj.misc.privacy.sec7-p = 비밀번호는 솔트를 더해 해시되고, 트래픽은 TLS로 제공되며, 채점기는 격리된 샌드박스에서 실행됩니다. 완벽하게 안전한 시스템은 없지만, 데이터를 보호하고 사고에 신속하게 대응하기 위해 노력합니다.
voj.misc.privacy.sec8-p = 개인 데이터에 언제든지 접근·내보내기·수정·삭제할 수 있습니다. privacy@verwandlung.org로 이메일을 보내시면 합리적인 기간 내에 응답하겠습니다.
voj.misc.privacy.sec9-p = Verwandlung은 만 13세 미만 아동을 대상으로 하지 않습니다. 아동이 동의 없이 가입했다고 생각되면 연락해 주세요. 계정을 삭제하겠습니다.
voj.misc.privacy.sec10-p = 플랫폼이 변경됨에 따라 본 방침을 업데이트할 수 있습니다. 중대한 업데이트는 변경 내역에 공지되며 위의 시행일이 개정됩니다.
voj.misc.privacy.sec11-p = 개인정보 관련 질문과 데이터 요청은 privacy@verwandlung.org로 보내거나 프로젝트의 GitHub 저장소에 이슈로 제기하실 수 있습니다.
voj.misc.privacy.contact-title = 데이터 사본을 원하시거나 삭제하고 싶으신가요?
voj.misc.privacy.contact-desc-prefix = 이메일
voj.misc.privacy.contact-desc-suffix = 으로 보내시면 요청을 처리하겠습니다.
voj.misc.privacy.visit-help = 도움말 센터로

# pages/help.html
voj.misc.help.title = 도움말 센터
voj.misc.help.eyebrow = 도움말 센터
voj.misc.help.hero-title = 막히셨나요? <span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = 코드 제출, 판정 읽기, 대회 참가에 대한 빠른 답변. 찾을 수 없나요? 토론 게시판과 운영자가 클릭 한 번 거리에 있습니다.
voj.misc.help.quick-start = 빠른 시작
voj.misc.help.q1-title = 풀이 제출하기
voj.misc.help.q1-desc = 아무 문제나 열고, 언어를 선택하고, 코드를 붙여넣은 다음 제출을 누르세요. 판정이 밀리초 안에 돌아옵니다.
voj.misc.help.q2-title = 판정 읽기
voj.misc.help.q2-desc = 각 테스트 케이스에 상태, 실행 시간, 메모리가 표시됩니다. 제출을 클릭하면 테스트별 세부 정보를 볼 수 있습니다.
voj.misc.help.q3-title = 대회 참가하기
voj.misc.help.q3-desc = 진행 중이거나 예정된 대회를 둘러보고, 등록하고, ACM 또는 OI 채점 규칙에 따라 풀이하세요.
voj.misc.help.verdict-legend = 판정 범례
voj.misc.help.verdict-ac = 정답
voj.misc.help.verdict-ac-desc = 모든 테스트 통과
voj.misc.help.verdict-wa = 오답
voj.misc.help.verdict-wa-desc = 출력 불일치
voj.misc.help.verdict-tle = 시간 초과
voj.misc.help.verdict-tle-desc = 어떤 테스트에서 너무 느림
voj.misc.help.verdict-mle = 메모리 초과
voj.misc.help.verdict-mle-desc = 메모리 상한 초과
voj.misc.help.verdict-re = 런타임 에러
voj.misc.help.verdict-re-desc = 실행 중 충돌
voj.misc.help.verdict-ce = 컴파일 에러
voj.misc.help.verdict-ce-desc = 소스 빌드 실패
voj.misc.help.faq = 자주 묻는 질문
voj.misc.help.faq-group-getting-started = 시작하기
voj.misc.help.faq-group-judging = 채점 및 판정
voj.misc.help.faq-group-contests = 대회
voj.misc.help.faq-group-account = 계정
voj.misc.help.faq-q1 = 첫 풀이는 어떻게 제출하나요?
voj.misc.help.faq-a1 = ~/problems에서 문제를 열고, 에디터에서 언어를 선택하고, 코드를 붙여넣거나 입력한 다음 제출을 클릭하세요. 코드는 가장 가까운 채점기에 대기열로 들어가며, 각 테스트가 실행됨에 따라 판정이 실시간으로 표시됩니다.
voj.misc.help.faq-q2 = 어떤 언어를 지원하나요?
voj.misc.help.faq-a2 = 항상 최신인 전체 목록은 제출 패널의 언어 선택기에 표시됩니다. 각 언어에는 고유의 컴파일러 플래그와 시간 제한 배수가 있습니다.
voj.misc.help.faq-q3 = 문제를 보려면 계정이 필요한가요?
voj.misc.help.faq-a3 = 계정 없이도 문제 설명을 둘러볼 수 있지만, 코드 제출, 대회 참가, 순위표 등록에는 가입이 필요합니다.
voj.misc.help.faq-q4 = 판정 코드는 무슨 뜻인가요?
voj.misc.help.faq-a4 = 위의 판정 범례를 참고하세요. AC는 모든 테스트를 통과했다는 뜻이며, WA, TLE, MLE, RE, CE는 각각 특정한 실패 유형을 가리켜 어디를 봐야 할지 알려줍니다.
voj.misc.help.faq-q5 = 왜 제 풀이가 TLE가 나나요?
voj.misc.help.faq-a5 = 프로그램이 적어도 하나의 테스트에서 시간 제한을 초과했습니다. 알고리즘의 복잡도를 점검하고, 느린 I/O를 피하고, 제출 상세 페이지의 테스트별 시간을 확인하여 느린 케이스를 찾으세요.
voj.misc.help.faq-q6 = 어떤 테스트 케이스가 실패했는지 볼 수 있나요?
voj.misc.help.faq-a6 = 연습 문제의 경우, 제출 상세 페이지에 처음 실패한 테스트 번호, 실행 시간, 메모리가 표시됩니다. 숨겨진 테스트 입력 자체는 공개되지 않습니다.
voj.misc.help.faq-q7 = 채점은 얼마나 빠른가요?
voj.misc.help.faq-a7 = 제출은 ActiveMQ를 통해 채점기 클러스터에 분산되며, 왕복 지연 시간의 중앙값은 약 11ms입니다. 대회 트래픽이 많을 때는 짧은 대기열이 더해질 수 있습니다.
voj.misc.help.faq-q8 = ACM과 OI 채점은 어떻게 다른가요?
voj.misc.help.faq-a8 = ACM은 해결한 문제 수로 순위를 매기며 오답 시도마다 페널티 시간이 더해집니다. OI는 통과한 테스트 그룹마다 부분 점수를 부여하므로 부분적으로 맞은 풀이도 점수를 얻습니다. 각 대회는 상세 페이지에 방식을 명시합니다.
voj.misc.help.faq-q9 = 대회가 끝난 후에도 제출할 수 있나요?
voj.misc.help.faq-a9 = 네 — 대회가 끝나면 문제는 연습 보관소로 이동하므로 계속 풀 수 있습니다. 그 제출은 최종 순위에 영향을 주지 않습니다.
voj.misc.help.faq-q10 = 비밀번호는 어떻게 재설정하나요?
voj.misc.help.faq-a10 = 로그인 페이지의 "비밀번호를 잊으셨나요" 링크를 사용하세요. 등록된 이메일로 재설정 링크가 전송됩니다. 도착하지 않으면 스팸을 확인하거나 help@verwandlung.org로 연락하세요.
voj.misc.help.faq-q11 = 사용자 이름을 바꿀 수 있나요?
voj.misc.help.faq-a11 = 사용자 이름은 제출 기록과 순위표 항목에 연결되어 있어 변경이 제한됩니다. 꼭 이름을 바꿔야 할 사정이 있으면 지원팀에 이메일을 보내세요.
voj.misc.help.still-stuck = 여전히 막히셨나요?
voj.misc.help.still-stuck-desc = 토론 게시판에서 커뮤니티에 질문하세요
voj.misc.help.or-email = , 또는 이메일
voj.misc.help.open-discussion = 토론 열기

