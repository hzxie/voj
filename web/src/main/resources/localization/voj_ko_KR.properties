# pages/privacy.html
voj.misc.privacy.title = 개인정보 및 쿠키
voj.misc.privacy.eyebrow = 개인정보 처리방침
voj.misc.privacy.hero-title = 당신의 데이터를,<br><span class="accent">소중히</span> 다룹니다.
voj.misc.privacy.hero-lead = 본 방침은 Verwandlung이 무엇을 수집하고, 왜 수집하며, 그에 대해 당신이 어떤 통제권을 갖는지 설명합니다. 데이터는 최소한으로 유지하며 — 채점, 대회, 프로필에 실제로 필요한 것만 보관합니다.
