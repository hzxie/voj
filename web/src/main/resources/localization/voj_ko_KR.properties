# pages/terms.html
voj.misc.terms.title = 이용약관
voj.misc.terms.eyebrow = 이용약관
voj.misc.terms.hero-title = 세부 조항,<br><span class="accent">전문 용어</span>는 빼고.
voj.misc.terms.hero-lead = 본 약관은 Verwandlung(문제, 대회, 채점 엔진, 토론 게시판)의 이용을 규율합니다. 쉬운 표현으로, 예상치 못한 일은 없습니다. 계정을 만들거나 코드를 제출하면 아래 내용에 동의하는 것입니다.
voj.misc.terms.chip-effective = 시행일
voj.misc.terms.chip-version = 버전
voj.misc.terms.chip-read = 약 4분 분량
voj.misc.terms.toc = 목차
voj.misc.terms.sec1-title = 약관 동의
voj.misc.terms.sec2-title = 계정 및 이용 자격
voj.misc.terms.sec3-title = 허용되는 이용
voj.misc.terms.sec4-title = 제출물 및 코드 소유권
voj.misc.terms.sec5-title = 대회 및 공정 경기
voj.misc.terms.sec6-title = 지식 재산권
voj.misc.terms.sec7-title = 서비스 가용성
voj.misc.terms.sec8-title = 보증의 부인
voj.misc.terms.sec9-title = 책임의 제한
voj.misc.terms.sec10-title = 본 약관의 변경
voj.misc.terms.sec11-title = 연락처
voj.misc.terms.sec1-p1 = Verwandlung에 접속하거나 계정을 만들면 본 이용약관과 개인정보 처리방침에 동의하는 것입니다. 동의하지 않으시면 플랫폼을 이용하지 마세요.
voj.misc.terms.sec1-p2 = 본 약관은 등록 여부와 관계없이 문제를 둘러보고, 코드를 제출하고, 대회에 참가하고, 토론 게시판에 글을 올리는 모든 사람에게 적용됩니다.
voj.misc.terms.sec2-p = 계정에서 이루어지는 활동과 비밀번호를 안전하게 보관하는 것은 본인의 책임입니다. 한 사람당 하나의 계정이며, 자동화되거나 공유된 계정은 정지될 수 있습니다.
voj.misc.terms.sec2-li1 = 판정과 보안 알림을 전달할 수 있도록 유효한 이메일을 제공하세요.
voj.misc.terms.sec2-li2 = 가입하려면 만 13세 이상이거나 보호자의 동의가 있어야 합니다.
voj.misc.terms.sec2-li3 = 무단 접근이 의심되면 즉시 알려 주세요.
voj.misc.terms.sec3-p = Verwandlung은 학습과 경쟁의 플랫폼입니다. 성실하게 알고리즘을 연습하고, 경쟁하고, 토론하는 데 사용하세요.
voj.misc.terms.sec3-li1 = 채점기 샌드박스를 공격하거나 과부하시키거나 탈출을 시도하지 마세요.
voj.misc.terms.sec3-li2 = 숨겨진 테스트 데이터를 빼내거나 다른 사용자의 제출을 캐내지 마세요.
voj.misc.terms.sec3-li3 = 스팸, 멀웨어, 공유할 권리가 없는 콘텐츠를 게시하지 마세요.
voj.misc.terms.sec4-p1 = 제출한 소스 코드의 소유권은 본인에게 있습니다. 제출함으로써, 판정을 돌려주기 위한 목적으로 그것을 컴파일·실행·저장·채점할 수 있는 제한적 라이선스를 Verwandlung에 부여하는 것입니다.
voj.misc.terms.sec4-p2 = 프로필 통계, 대회 순위, 표절 검사를 위해 제출물을 보관할 수 있습니다.
voj.misc.terms.sec5-p = 순위가 매겨지는 대회는 본 약관에 더해 각 대회 고유의 규칙을 따릅니다. 부정행위는 모두의 노력을 해치며 엄중하게 다룹니다.
voj.misc.terms.sec5-li1 = 진행 중인 대회 동안 풀이나 계정을 공유하지 마세요.
voj.misc.terms.sec5-li2 = 순위를 조작하기 위해 여러 계정을 사용하지 마세요.
voj.misc.terms.sec5-li3 = 채점 엔진의 판정과 페널티는 재채점이 이루어지지 않는 한 최종적입니다.
voj.misc.terms.sec6-p = Verwandlung 엔진은 GPL-3.0 오픈소스입니다. 문제 설명, 테스트 데이터, 해설 콘텐츠는 각 저작자의 재산으로 남으며 허가 없이 재배포할 수 없습니다.
voj.misc.terms.sec7-p = 분산 채점기 클러스터를 운영하며 높은 가용성을 목표로 하지만, 서비스는 최선의 노력으로 제공됩니다. 점검, 마이그레이션, 장애로 인해 채점이 때때로 중단될 수 있습니다.
voj.misc.terms.sec8-p = Verwandlung은 어떠한 종류의 보증도 없이 "있는 그대로" 제공됩니다. 판정, 지연 시간, 순위가 항상 오류 없음을 보장하지 않습니다.
voj.misc.terms.sec9-p = 법이 허용하는 최대한의 범위에서, Verwandlung과 그 운영자는 대회 순위나 데이터의 손실을 포함하여 플랫폼 이용으로 인해 발생하는 어떠한 간접적 또는 결과적 손해에 대해서도 책임지지 않습니다.
voj.misc.terms.sec10-p = 플랫폼이 발전함에 따라 본 약관을 업데이트할 수 있습니다. 중대한 변경은 변경 내역에 공지되며 위의 시행일이 개정됩니다. 변경 후에도 계속 이용하면 변경에 동의하는 것입니다.
voj.misc.terms.sec11-p = 질문, 분쟁, 게시 중단 요청은 legal@verwandlung.org로 보내거나 프로젝트의 GitHub 저장소에 이슈로 제기하실 수 있습니다.
voj.misc.terms.contact-title = 본 약관에 대해 궁금하신가요?
voj.misc.terms.contact-desc-prefix = 운영자에게 연락하려면
voj.misc.terms.contact-desc-suffix = 으로, 또는 GitHub에 이슈를 등록하세요.
