voj.misc.terms.sec11-title = お問い合わせ
voj.misc.terms.sec1-p1 = Verwandlung にアクセスするかアカウントを作成することで、本利用規約とプライバシーポリシーに同意したものとみなされます。同意いただけない場合は、本プラットフォームをご利用にならないでください。
voj.misc.terms.sec1-p2 = 本規約は、登録の有無にかかわらず、問題を閲覧し、コードを提出し、コンテストに参加し、ディスカッションボードに投稿するすべての人に適用されます。
voj.misc.terms.sec2-p = アカウントでの活動とパスワードの安全な管理は、すべてあなたの責任です。1 人につき 1 アカウント。自動化された、または共有のアカウントは停止される場合があります。
voj.misc.terms.sec2-li1 = 判定やセキュリティ通知をお届けできるよう、有効なメールアドレスをご提供ください。
voj.misc.terms.sec2-li2 = 登録には 13 歳以上であるか、保護者の同意が必要です。
voj.misc.terms.sec2-li3 = 不正アクセスが疑われる場合は、速やかにお知らせください。
voj.misc.terms.sec3-p = Verwandlung は学習と競技のプラットフォームです。誠実にアルゴリズムを練習し、競い、議論するためにご利用ください。
voj.misc.terms.sec3-li1 = ジャッジのサンドボックスを攻撃・過負荷にしたり、回避を試みたりしないでください。
voj.misc.terms.sec3-li2 = 隠しテストデータを抜き出したり、他のユーザーの提出を探ったりしないでください。
voj.misc.terms.sec3-li3 = スパム、マルウェア、共有する権利のないコンテンツを投稿しないでください。
voj.misc.terms.sec4-p1 = 提出したソースコードの所有権はあなたが保持します。提出することで、判定を返す目的でそれをコンパイル・実行・保存・採点する限定的なライセンスを Verwandlung に付与するものとします。
voj.misc.terms.sec4-p2 = プロフィール統計、コンテスト順位、盗作チェックのために提出物を保持する場合があります。
voj.misc.terms.sec5-p = ランク付けされるコンテストは、本規約に加えて各コンテスト個別のルールに従います。不正行為は全員の努力を損なうものであり、厳正に対処します。
voj.misc.terms.sec5-li1 = 開催中のコンテスト中に解答やアカウントを共有しないでください。
voj.misc.terms.sec5-li2 = 順位を操作するために複数のアカウントを使用しないでください。
voj.misc.terms.sec5-li3 = ジャッジエンジンによる判定とペナルティは、再判定が行われない限り最終的なものです。
voj.misc.terms.sec6-p = Verwandlung エンジンは GPL-3.0 のオープンソースです。問題文、テストデータ、解説コンテンツはそれぞれの著作者に帰属し、許可なく再配布することはできません。
voj.misc.terms.sec7-p = 分散ジャッジクラスタを運用し高い可用性を目指していますが、本サービスはベストエフォートで提供されます。メンテナンス、移行、障害により判定が中断する場合があります。
voj.misc.terms.sec8-p = Verwandlung は「現状のまま」提供され、いかなる保証も行いません。判定、遅延、順位が常に誤りのないものであることを保証するものではありません。
voj.misc.terms.sec9-p = 法律で認められる最大限の範囲で、Verwandlung およびその運営者は、コンテスト順位やデータの喪失を含め、本プラットフォームの利用から生じるいかなる間接的または結果的な損害についても責任を負いません。
voj.misc.terms.sec10-p = プラットフォームの進化に伴い本規約を更新する場合があります。重要な変更は変更履歴で告知され、上記の発効日が改訂されます。変更後も利用を継続した場合、変更に同意したものとみなされます。
voj.misc.terms.sec11-p = ご質問、紛争、削除依頼は legal@verwandlung.org までお送りいただくか、プロジェクトの GitHub リポジトリで issue として提起してください。
voj.misc.terms.contact-title = 本規約についてご質問がありますか？
voj.misc.terms.contact-desc-prefix = 運営者へのご連絡は
voj.misc.terms.contact-desc-suffix = まで、または GitHub で issue を開いてください。
