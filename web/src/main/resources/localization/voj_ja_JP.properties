voj.misc.privacy.title = プライバシーとCookie
voj.misc.privacy.eyebrow = プライバシーポリシー
voj.misc.privacy.hero-title = あなたのデータを、<br><span class="accent">大切に</span>扱います。
voj.misc.privacy.hero-lead = 本ポリシーは、Verwandlung が何を収集し、なぜ収集し、それに対してあなたがどのような管理権を持つかを説明します。データは最小限に抑え、判定・コンテスト・プロフィールに本当に必要なものだけを保持します。
