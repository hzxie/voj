# pages/help.html
voj.misc.help.title = ヘルプセンター
voj.misc.help.eyebrow = ヘルプセンター
voj.misc.help.hero-title = お困りですか？ <span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = コードの提出、判定の読み方、コンテストへの参加についての簡単な回答。見つからない場合は、ディスカッションボードと運営者がワンクリックで利用できます。
voj.misc.help.quick-start = クイックスタート
voj.misc.help.q1-title = 解答を提出する
voj.misc.help.q1-desc = 任意の問題を開き、言語を選び、コードを貼り付けて提出を押します。判定はミリ秒で返ってきます。
voj.misc.help.q2-title = 判定を読む
voj.misc.help.q2-desc = 各テストケースに状態、実行時間、メモリが表示されます。提出をクリックするとテストごとの詳細が見られます。
voj.misc.help.q3-title = コンテストに参加する
voj.misc.help.q3-desc = 開催中・予定のコンテストを閲覧し、登録して、ACM または OI の採点ルールで解答します。
voj.misc.help.verdict-legend = 判定の凡例
