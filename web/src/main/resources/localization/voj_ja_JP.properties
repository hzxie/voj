# pages/about.html
voj.misc.about.title = このサイトについて
voj.misc.about.eyebrow = 概要
voj.misc.about.hero-title = ソースを<br><span class="accent">判定</span>へと変えるジャッジ。
voj.misc.about.hero-lead = Verwandlung は、Spring Boot と ActiveMQ で連携する分散ジャッジ群の上に構築された、オープンソースのクロスプラットフォームなオンラインジャッジです。隔離されたランナーで提出物をコンパイル・実行し、隠しテストケースに対して採点します。本サイトのすべてのコンテストと練習問題を支えるのと同じエンジンです。
voj.misc.about.architecture = アーキテクチャ
voj.misc.about.arch-spring-boot-desc = 問題、提出、コンテストを配信する Java バックエンド。
voj.misc.about.arch-activemq-desc = ジャッジ群にジャッジジョブを分散するメッセージブローカー。
voj.misc.about.arch-judgers-desc = 時間とメモリの制限下で動く、Linux・Windows 向けのクロスプラットフォームな隔離ランナー。
voj.misc.about.arch-mysql-desc = ユーザー、問題、テストデータ、判定の永続ストア。
voj.misc.about.arch-mybatis-desc = Spring サービスとデータベース間の SQL マッピング層。
voj.misc.about.arch-thymeleaf-desc = 重い SPA フレームワークを使わないサーバーレンダリングのビュー。
voj.misc.about.milestones = マイルストーン
voj.misc.about.milestone-2014 = 最初のコミット。当初からオンラインジャッジでは珍しく Linux・Windows のクロスプラットフォームジャッジを備えていました。
voj.misc.about.milestone-2015 = ActiveMQ を追加し、ウェブアプリとジャッジがメッセージキューで通信できるようになり、複数マシンでジャッジを実行可能になりました。
voj.misc.about.milestone-2018 = ウェブとジャッジのコンポーネントを Docker でコンテナ化。
voj.misc.about.milestone-2023 = 両モジュールを Spring 6 にアップグレード。
voj.misc.about.milestone-2026 = ウェブとジャッジのモジュールを Spring Boot 4 で再構築。
voj.misc.about.milestone-sandbox = ネイティブの Linux・Windows サンドボックスが従来のランナーを置き換え。
voj.misc.about.milestone-redesign = サイト全体の刷新された新しい UI デザイン。
