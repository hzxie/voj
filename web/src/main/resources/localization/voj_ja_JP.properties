voj.misc.privacy.sec1-p = プラットフォームの動作に必要なものだけを収集します。Verwandlung には第三者の広告やトラッキングピクセルはありません。
voj.misc.privacy.sec1-li1 = アカウントデータ — ユーザー名、メールアドレス、ハッシュ化されたパスワード。
voj.misc.privacy.sec1-li2 = 提出データ — ソースコード、言語、判定、実行時間、メモリ。
voj.misc.privacy.sec1-li3 = 活動データ — コンテスト参加、ディスカッション投稿、プロフィール設定。
voj.misc.privacy.sec1-li4 = 技術データ — セキュリティのため一時的に保持する IP アドレスとブラウザ情報。
voj.misc.privacy.sec2-p = あなたのデータは中核的な体験を支えます。コードのコンパイルと採点、プロフィール統計の作成、コンテスト順位付け、プラットフォームの安全維持です。
voj.misc.privacy.sec2-li1 = 判定を返し、結果通知をお届けします。
voj.misc.privacy.sec2-li2 = 順位表、レーティング、正解した問題の履歴を計算します。
voj.misc.privacy.sec2-li3 = 不正行為、盗作、サンドボックス回避の試みを検出します。
voj.misc.privacy.sec3-p = ログイン状態を保つためにセッション Cookie を、テーマなどの設定を記憶するためにブラウザのローカルストレージを使用します。他サイトを横断してあなたを追跡するために Cookie を使用することはありません。
voj.misc.privacy.sec4-p = 提出されたソースは、後で確認できるように、また盗作比較を実行できるように保存されます。隠しテストやコンテストのコードが販売されたり広告主と共有されたりすることは決してありません。
voj.misc.privacy.sec5-p = 個人データを販売することはありません。一部の情報は設計上公開されます — ユーザー名、レーティング、正解した提出は順位表やプロフィールに表示されます。
voj.misc.privacy.sec5-li1 = 公開：ユーザー名、アバター、レーティング、正解した問題。
voj.misc.privacy.sec5-li2 = 非公開：メールアドレス、IP アドレス、パスワードのハッシュ。
voj.misc.privacy.sec5-li3 = 法的に必要な場合に限りデータを開示することがあります。
voj.misc.privacy.sec6-p = アカウントが有効な間、アカウントと提出のデータを保持します。アカウントを削除すると個人を特定する情報は削除されますが、順位の整合性のため匿名化されたコンテスト結果は残る場合があります。
voj.misc.privacy.sec7-p = パスワードはソルト付きでハッシュ化され、通信は TLS で配信され、ジャッジは隔離されたサンドボックスで実行されます。完全に安全なシステムは存在しませんが、データを保護し、インシデントには迅速に対応するよう努めます。
voj.misc.privacy.sec8-p = 個人データはいつでもアクセス・エクスポート・訂正・削除できます。privacy@verwandlung.org までメールいただければ、合理的な期間内に対応します。
voj.misc.privacy.sec9-p = Verwandlung は 13 歳未満の子どもを対象としていません。同意なく子どもが登録したと思われる場合はご連絡ください。アカウントを削除します。
voj.misc.privacy.sec10-p = プラットフォームの変更に伴い本ポリシーを更新する場合があります。重要な更新は変更履歴で告知され、上記の発効日が改訂されます。
voj.misc.privacy.sec11-p = プライバシーに関するご質問やデータ要求は privacy@verwandlung.org までお送りいただくか、プロジェクトの GitHub リポジトリで issue として提起してください。
