voj.misc.help.verdict-ac-desc = すべてのテストに合格
voj.misc.help.verdict-wa = 不正解
voj.misc.help.verdict-wa-desc = 出力の不一致
voj.misc.help.verdict-tle = 時間超過
voj.misc.help.verdict-tle-desc = あるテストで遅すぎる
voj.misc.help.verdict-mle = メモリ超過
voj.misc.help.verdict-mle-desc = メモリ上限を超過
voj.misc.help.verdict-re = 実行時エラー
voj.misc.help.verdict-re-desc = 実行中にクラッシュ
voj.misc.help.verdict-ce = コンパイルエラー
voj.misc.help.verdict-ce-desc = ソースのビルドに失敗
voj.misc.help.faq = よくある質問
voj.misc.help.faq-group-getting-started = はじめに
voj.misc.help.faq-group-judging = ジャッジと判定
voj.misc.help.faq-group-contests = コンテスト
voj.misc.help.faq-group-account = アカウント
voj.misc.help.faq-q1 = 最初の解答はどうやって提出しますか？
voj.misc.help.faq-a1 = ~/problems から問題を開き、エディタで言語を選び、コードを貼り付けるか入力して提出をクリックします。コードは最寄りのジャッジにキューイングされ、各テストが実行されるにつれて判定がリアルタイムで表示されます。
voj.misc.help.faq-q2 = どの言語に対応していますか？
voj.misc.help.faq-a2 = 常に最新の完全な一覧は、提出パネルの言語セレクタに表示されます。各言語には独自のコンパイラフラグと制限時間の倍率があります。
voj.misc.help.faq-q3 = 問題を見るのにアカウントは必要ですか？
voj.misc.help.faq-a3 = アカウントなしで問題文を閲覧できますが、コードの提出、コンテスト参加、順位表への掲載には登録が必要です。
voj.misc.help.faq-q4 = 判定コードは何を意味しますか？
voj.misc.help.faq-a4 = 上記の判定凡例を参照してください。AC はすべてのテストに合格したことを意味し、WA、TLE、MLE、RE、CE はそれぞれ特定の失敗の種類を示すので、どこを見ればよいかが分かります。
voj.misc.help.faq-q5 = なぜ解答が TLE になるのですか？
voj.misc.help.faq-a5 = プログラムが少なくとも 1 つのテストで制限時間を超過しています。アルゴリズムの計算量を見直し、遅い I/O を避け、提出詳細ページのテストごとの時間を確認して遅いケースを見つけてください。
voj.misc.help.faq-q6 = どのテストケースで失敗したか分かりますか？
voj.misc.help.faq-a6 = 練習問題では、提出詳細ページに最初に失敗したテスト番号、実行時間、メモリが表示されます。隠しテストの入力自体は公開されません。
voj.misc.help.faq-q7 = ジャッジの速さはどれくらいですか？
voj.misc.help.faq-a7 = 提出は ActiveMQ を介してジャッジクラスタに分散され、往復の中央値はおよそ 11ms です。コンテストの高負荷時には短い待ち行列が加わる場合があります。
voj.misc.help.faq-q8 = ACM と OI の採点はどう違いますか？
voj.misc.help.faq-a8 = ACM は正解した問題数で順位を付け、誤答ごとにペナルティ時間が加わります。OI は合格したテストグループごとに部分点が与えられるので、部分的に正しい解答でも得点します。各コンテストはその方式を詳細ページに記載しています。
voj.misc.help.faq-q9 = コンテスト終了後に提出できますか？
voj.misc.help.faq-a9 = はい — コンテストが終了すると問題は練習アーカイブに移るので、解き続けられます。それらの提出は最終順位に影響しません。
voj.misc.help.faq-q10 = パスワードはどうやって再設定しますか？
voj.misc.help.faq-a10 = ログインページの「パスワードをお忘れですか」リンクを使ってください。登録済みのメールアドレスに再設定リンクが送られます。届かない場合は迷惑メールを確認するか、help@verwandlung.org までご連絡ください。
voj.misc.help.faq-q11 = ユーザー名は変更できますか？
voj.misc.help.faq-a11 = ユーザー名は提出履歴や順位表のエントリと結び付いているため、変更は制限されています。どうしても改名が必要な場合はサポートまでメールしてください。
voj.misc.help.still-stuck = まだ解決しませんか？
voj.misc.help.still-stuck-desc = ディスカッションボードでコミュニティに質問する
voj.misc.help.or-email = 、またはメール
