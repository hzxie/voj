voj.misc.help.faq-group-getting-started = Начало работы
voj.misc.help.faq-group-judging = Проверка и вердикты
voj.misc.help.faq-group-contests = Соревнования
voj.misc.help.faq-group-account = Аккаунт
voj.misc.help.faq-q1 = Как отправить своё первое решение?
voj.misc.help.faq-a1 = Откройте задачу из ~/problems, выберите язык в редакторе, вставьте или введите код и нажмите отправить. Ваш код ставится в очередь на ближайший проверяющий, и вердикт появляется вживую по мере выполнения каждого теста.
voj.misc.help.faq-q2 = Какие языки поддерживаются?
voj.misc.help.faq-a2 = Полный, всегда актуальный список показан в селекторе языка на панели отправки. У каждого языка свои флаги компилятора и множитель ограничения времени.
voj.misc.help.faq-q3 = Нужен ли аккаунт для просмотра задач?
voj.misc.help.faq-a3 = Вы можете просматривать условия задач без аккаунта, но для отправки кода, участия в соревнованиях и появления в таблицах лидеров нужна регистрация.
voj.misc.help.faq-q4 = Что означают коды вердиктов?
voj.misc.help.faq-a4 = Смотрите легенду вердиктов выше. AC означает, что все тесты пройдены; WA, TLE, MLE, RE и CE каждый указывает на конкретный тип сбоя, чтобы вы знали, куда смотреть.
voj.misc.help.faq-q5 = Почему моё решение получает TLE?
voj.misc.help.faq-a5 = Ваша программа превысила ограничение времени хотя бы на одном тесте. Оцените сложность алгоритма, избегайте медленного ввода-вывода и проверьте время по каждому тесту на странице деталей посылки, чтобы найти медленный случай.
voj.misc.help.faq-q6 = Могу ли я узнать, какой тест не прошёл?
voj.misc.help.faq-a6 = Для тренировочных задач страница деталей посылки показывает номер первого упавшего теста, время выполнения и память. Сами входные данные скрытых тестов не раскрываются.
voj.misc.help.faq-q7 = Насколько быстра проверка?
voj.misc.help.faq-a7 = Посылки распределяются по кластеру проверяющих через ActiveMQ с медианной задержкой около 11 мс. При большой нагрузке соревнований может добавиться короткая очередь.
voj.misc.help.faq-q8 = Чем отличается подсчёт ACM и OI?
voj.misc.help.faq-a8 = ACM ранжирует по числу решённых задач со штрафным временем за каждую неверную попытку. OI начисляет частичные баллы за каждую пройденную группу тестов, поэтому частично верное решение всё равно набирает баллы. Каждое соревнование указывает свой режим на странице деталей.
voj.misc.help.faq-q9 = Могу ли я отправлять решения после окончания соревнования?
voj.misc.help.faq-a9 = Да — после закрытия соревнования задачи переходят в тренировочный архив, так что вы можете продолжать их решать. Эти посылки не влияют на итоговую таблицу.
voj.misc.help.faq-q10 = Как сбросить пароль?
voj.misc.help.faq-a10 = Используйте ссылку «забыли пароль» на странице входа. Ссылка для сброса отправляется на ваш зарегистрированный email; если она не пришла, проверьте спам или напишите на help@verwandlung.org.
voj.misc.help.faq-q11 = Могу ли я сменить имя пользователя?
voj.misc.help.faq-a11 = Имена пользователей привязаны к истории ваших посылок и записям в таблицах лидеров, поэтому смена ограничена. Напишите в поддержку, если у вас есть веская причина для переименования.
