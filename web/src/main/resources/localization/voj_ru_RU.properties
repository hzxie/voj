# pages/terms.html
voj.misc.terms.title = Условия использования
voj.misc.terms.eyebrow = Условия обслуживания
voj.misc.terms.hero-title = Мелкий шрифт,<br>без <span class="accent">канцелярита.</span>
voj.misc.terms.hero-lead = Эти условия регулируют ваше использование Verwandlung — задач, соревнований, движка проверки и доски обсуждений. Простым языком, без сюрпризов. Создавая аккаунт или отправляя код, вы соглашаетесь с тем, что следует ниже.
voj.misc.terms.chip-effective = Действует с
voj.misc.terms.chip-version = Версия
voj.misc.terms.chip-read = чтение ~4 мин
voj.misc.terms.toc = Содержание
voj.misc.terms.sec1-title = Принятие условий
voj.misc.terms.sec2-title = Аккаунты и право пользования
voj.misc.terms.sec3-title = Допустимое использование
voj.misc.terms.sec4-title = Посылки и владение кодом
voj.misc.terms.sec5-title = Соревнования и честная игра
voj.misc.terms.sec6-title = Интеллектуальная собственность
voj.misc.terms.sec7-title = Доступность сервиса
voj.misc.terms.sec8-title = Отказ от гарантий
voj.misc.terms.sec9-title = Ограничение ответственности
voj.misc.terms.sec10-title = Изменения этих условий
voj.misc.terms.sec11-title = Контакты
voj.misc.terms.sec1-p1 = Получая доступ к Verwandlung или создавая аккаунт, вы соглашаетесь с этими Условиями обслуживания и нашей Политикой конфиденциальности. Если вы не согласны, пожалуйста, не используйте платформу.
voj.misc.terms.sec1-p2 = Эти условия применяются ко всем, кто просматривает задачи, отправляет код, участвует в соревнованиях или пишет на доске обсуждений — зарегистрированным или нет.
voj.misc.terms.sec2-p = Вы отвечаете за действия под вашим аккаунтом и за сохранность вашего пароля. Один человек — один аккаунт; автоматизированные или общие аккаунты могут быть приостановлены.
voj.misc.terms.sec2-li1 = Укажите действующий email, чтобы мы могли доставлять вердикты и уведомления безопасности.
voj.misc.terms.sec2-li2 = Для регистрации вам должно быть не менее 13 лет либо иметь согласие опекуна.
voj.misc.terms.sec2-li3 = Незамедлительно сообщайте нам, если подозреваете несанкционированный доступ.
voj.misc.terms.sec3-p = Verwandlung — это платформа для обучения и соревнований. Используйте её, чтобы добросовестно практиковаться, состязаться и обсуждать алгоритмы.
voj.misc.terms.sec3-li1 = Не атакуйте, не перегружайте и не пытайтесь выйти из песочницы проверяющего.
voj.misc.terms.sec3-li2 = Не извлекайте скрытые тестовые данные и не зондируйте посылки других пользователей.
voj.misc.terms.sec3-li3 = Не публикуйте спам, вредоносное ПО или контент, на распространение которого у вас нет прав.
voj.misc.terms.sec4-p1 = Вы сохраняете право собственности на отправленный вами исходный код. Отправляя его, вы предоставляете Verwandlung ограниченную лицензию на компиляцию, выполнение, хранение и оценку с целью возврата вердикта.
voj.misc.terms.sec4-p2 = Мы можем сохранять посылки для формирования статистики вашего профиля, турнирных таблиц и проверок на плагиат.
voj.misc.terms.sec5-p = Рейтинговые соревнования регулируются их индивидуальными правилами в дополнение к этим условиям. Жульничество подрывает усилия всех и воспринимается серьёзно.
voj.misc.terms.sec5-li1 = Никакого обмена решениями или аккаунтами во время идущего соревнования.
voj.misc.terms.sec5-li2 = Никаких нескольких аккаунтов для манипуляции турнирной таблицей.
voj.misc.terms.sec5-li3 = Вердикты и штрафы от движка проверки окончательны, если не назначена перепроверка.
voj.misc.terms.sec6-p = Движок Verwandlung имеет открытый исходный код под лицензией GPL-3.0. Условия задач, тестовые данные и разборы остаются собственностью их авторов и не могут распространяться без разрешения.
voj.misc.terms.sec7-p = Мы запускаем распределённый кластер проверяющих и стремимся к высокой доступности, но сервис предоставляется по принципу «насколько возможно». Обслуживание, миграции и сбои могут время от времени прерывать проверку.
voj.misc.terms.sec8-p = Verwandlung предоставляется «как есть» без каких-либо гарантий. Мы не гарантируем, что вердикты, задержки или турнирные таблицы всегда будут без ошибок.
voj.misc.terms.sec9-p = В максимальной степени, допускаемой законом, Verwandlung и его сопровождающие не несут ответственности за любой косвенный или сопутствующий ущерб, возникший из-за использования вами платформы, включая потерю места в турнирной таблице или данных.
voj.misc.terms.sec10-p = Мы можем обновлять эти условия по мере развития платформы. О существенных изменениях будет объявлено в журнале изменений, а дата вступления в силу выше будет пересмотрена. Продолжение использования после изменений означает их принятие.
voj.misc.terms.sec11-p = Вопросы, споры или запросы на удаление можно направлять на legal@verwandlung.org либо поднимать как issue в репозитории проекта на GitHub.
voj.misc.terms.contact-title = Вопросы об этих условиях?
voj.misc.terms.contact-desc-prefix = Свяжитесь с сопровождающими по адресу
voj.misc.terms.contact-desc-suffix = или откройте issue на GitHub.
