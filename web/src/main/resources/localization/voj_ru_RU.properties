voj.misc.about.title = О нас
voj.misc.about.eyebrow = О проекте
voj.misc.about.hero-title = Судья, превращающий<br>исходник в <span class="accent">вердикт.</span>
voj.misc.about.hero-lead = Verwandlung — это открытая кроссплатформенная система онлайн-проверки, построенная на Spring Boot и распределённом пуле проверяющих, координируемых через ActiveMQ. Она компилирует, запускает и оценивает посылки на скрытых тестах в изолированных раннерах. Это тот же движок, что стоит за каждым соревнованием и тренировочной задачей на этом сайте.
voj.misc.about.architecture = Архитектура
voj.misc.about.arch-spring-boot-desc = Java-бэкенд, обслуживающий задачи, посылки и соревнования.
voj.misc.about.arch-activemq-desc = Брокер сообщений, распределяющий задания проверки по пулу проверяющих.
voj.misc.about.arch-judgers-desc = Кроссплатформенные изолированные раннеры для Linux и Windows с ограничениями по времени и памяти.
voj.misc.about.arch-mysql-desc = Постоянное хранилище для пользователей, задач, тестовых данных и вердиктов.
voj.misc.about.arch-mybatis-desc = Слой сопоставления SQL между сервисами Spring и базой данных.
voj.misc.about.arch-thymeleaf-desc = Серверный рендеринг представлений без тяжёлого SPA-фреймворка.
voj.misc.about.milestones = Вехи
voj.misc.about.milestone-2014 = Первый коммит, уже с кроссплатформенными проверяющими на Linux и Windows, что редкость среди систем онлайн-проверки.
voj.misc.about.milestone-2015 = Добавлен ActiveMQ, чтобы веб-приложение и проверяющие общались через очередь сообщений и проверка могла выполняться на нескольких машинах.
voj.misc.about.milestone-2018 = Веб- и проверяющий компоненты упакованы в контейнеры с помощью Docker.
voj.misc.about.milestone-2023 = Оба модуля обновлены до Spring 6.
voj.misc.about.milestone-2026 = Веб- и проверяющий модули перестроены на Spring Boot 4.
voj.misc.about.milestone-sandbox = Нативные песочницы Linux и Windows заменили устаревший раннер.
voj.misc.about.milestone-redesign = Совершенно новый дизайн интерфейса по всему сайту.
voj.misc.about.maintainer = Сопровождающий
voj.misc.about.maintainer-role = создатель и ведущий сопровождающий · с 2014
