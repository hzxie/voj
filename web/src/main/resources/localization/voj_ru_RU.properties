# pages/privacy.html
voj.misc.privacy.title = Конфиденциальность и Cookie
voj.misc.privacy.eyebrow = Политика конфиденциальности
voj.misc.privacy.hero-title = Ваши данные,<br>с которыми обращаются <span class="accent">бережно.</span>
voj.misc.privacy.hero-lead = Эта политика объясняет, что собирает Verwandlung, зачем мы это собираем и какой контроль у вас есть над этим. Мы храним минимум данных — только то, что действительно нужно для проверки, соревнований и вашего профиля.
