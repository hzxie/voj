voj.misc.help.q2-title = Прочитать вердикт
voj.misc.help.q2-desc = Каждый тест показывает статус, время выполнения и память. Нажмите на посылку, чтобы увидеть детали по каждому тесту.
voj.misc.help.q3-title = Участвовать в соревновании
