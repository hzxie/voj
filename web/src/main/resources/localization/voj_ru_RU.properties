voj.misc.privacy.chip-gdpr-aligned = соответствует
voj.misc.privacy.chip-read = чтение ~4 мин
voj.misc.privacy.toc = Содержание
voj.misc.privacy.sec1-title = Какую информацию мы собираем
voj.misc.privacy.sec2-title = Как мы используем информацию
voj.misc.privacy.sec3-title = Cookie и локальное хранилище
voj.misc.privacy.sec4-title = Код и данные посылок
voj.misc.privacy.sec5-title = Передача данных
voj.misc.privacy.sec6-title = Хранение данных
voj.misc.privacy.sec7-title = Безопасность
voj.misc.privacy.sec8-title = Ваши права
voj.misc.privacy.sec9-title = Конфиденциальность детей
voj.misc.privacy.sec10-title = Изменения этой политики
voj.misc.privacy.sec11-title = Контакты
voj.misc.privacy.sec1-p = Мы собираем только то, что нужно платформе для работы. На Verwandlung нет сторонней рекламы или отслеживающих пикселей.
voj.misc.privacy.sec1-li1 = Данные аккаунта — имя пользователя, email и хешированный пароль.
voj.misc.privacy.sec1-li2 = Данные посылок — ваш исходный код, язык, вердикт, время выполнения и память.
voj.misc.privacy.sec1-li3 = Данные активности — участие в соревнованиях, посты в обсуждениях и настройки профиля.
voj.misc.privacy.sec1-li4 = Технические данные — IP-адрес и сведения о браузере, временно хранимые в целях безопасности.
voj.misc.privacy.sec2-p = Ваши данные обеспечивают основной опыт: компиляцию и оценку кода, формирование статистики профиля, ранжирование турнирных таблиц и поддержание безопасности платформы.
voj.misc.privacy.sec2-li1 = Возвращать вердикты и доставлять уведомления о результатах.
voj.misc.privacy.sec2-li2 = Вычислять таблицы лидеров, рейтинги и историю решённых задач.
voj.misc.privacy.sec2-li3 = Выявлять злоупотребления, плагиат и попытки выхода из песочницы.
voj.misc.privacy.sec3-p = Мы используем сессионный cookie, чтобы вы оставались в системе, и локальное хранилище браузера, чтобы запоминать настройки вроде темы. Мы не используем cookie, чтобы отслеживать вас на других сайтах.
voj.misc.privacy.sec4-p = Отправленный исходник хранится, чтобы вы могли просмотреть его позже и чтобы мы могли проводить сравнения на плагиат. Код из скрытых тестов и соревнований никогда не продаётся и не передаётся рекламодателям.
voj.misc.privacy.sec5-p = Мы не продаём ваши персональные данные. Часть информации публична по замыслу — ваше имя пользователя, рейтинг и принятые посылки появляются в таблицах лидеров и профилях.
voj.misc.privacy.sec5-li1 = Публично: имя пользователя, аватар, рейтинг и решённые задачи.
voj.misc.privacy.sec5-li2 = Приватно: email, IP-адрес и хеш пароля.
voj.misc.privacy.sec5-li3 = Мы можем раскрывать данные только когда это требуется по закону.
voj.misc.privacy.sec6-p = Мы храним данные аккаунта и посылок, пока ваш аккаунт активен. Если вы удалите аккаунт, персональные идентификаторы будут удалены, хотя обезличенные результаты соревнований могут сохраняться ради целостности турнирных таблиц.
voj.misc.privacy.sec7-p = Пароли солятся и хешируются, трафик передаётся по TLS, а проверяющие работают в изолированных песочницах. Ни одна система не идеально безопасна, но мы стараемся защищать ваши данные и быстро реагировать на инциденты.
voj.misc.privacy.sec8-p = Вы можете в любое время получить доступ к своим персональным данным, экспортировать, исправить или удалить их. Напишите на privacy@verwandlung.org, и мы ответим в разумный срок.
voj.misc.privacy.sec9-p = Verwandlung не предназначен для детей младше 13 лет. Если вы считаете, что ребёнок зарегистрировался без согласия, свяжитесь с нами, и мы удалим аккаунт.
voj.misc.privacy.sec10-p = Мы можем обновлять эту политику по мере изменения платформы. О существенных обновлениях будет объявлено в журнале изменений, а дата вступления в силу выше будет пересмотрена.
voj.misc.privacy.sec11-p = Вопросы о конфиденциальности и запросы данных можно направлять на privacy@verwandlung.org либо поднимать как issue в репозитории проекта на GitHub.
voj.misc.privacy.contact-title = Хотите копию своих данных или их удаление?
voj.misc.privacy.contact-desc-prefix = Напишите
voj.misc.privacy.contact-desc-suffix = и мы обработаем ваш запрос.
