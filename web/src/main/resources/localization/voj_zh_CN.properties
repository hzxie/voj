# pages/about.html
voj.misc.about.title = 关于我们
voj.misc.about.eyebrow = 关于
voj.misc.about.hero-title = 把源代码<br>化为<span class="accent">评测结果。</span>
voj.misc.about.hero-lead = Verwandlung 是一个开源、跨平台的在线评测系统，基于 Spring Boot 构建，并通过 ActiveMQ 协调一组分布式评测机。它在沙箱运行器中针对隐藏测试用例编译、运行并评判提交。本站每一场竞赛和每一道练习题背后都是同一个引擎。
voj.misc.about.architecture = 架构
voj.misc.about.arch-spring-boot-desc = 提供题目、提交和竞赛服务的 Java 后端。
voj.misc.about.arch-activemq-desc = 在评测机集群间分发评测任务的消息中间件。
voj.misc.about.arch-judgers-desc = 面向 Linux 和 Windows 的跨平台沙箱运行器，受时间和内存限制约束。
voj.misc.about.arch-mysql-desc = 用户、题目、测试数据和评测结果的持久化存储。
voj.misc.about.arch-mybatis-desc = Spring 服务与数据库之间的 SQL 映射层。
voj.misc.about.arch-thymeleaf-desc = 服务端渲染视图，不依赖重量级 SPA 框架。
voj.misc.about.milestones = 里程碑
voj.misc.about.milestone-2014 = 首次提交，便已支持 Linux 和 Windows 上的跨平台评测机，这在在线评测系统中并不多见。
voj.misc.about.milestone-2015 = 引入 ActiveMQ，使 Web 应用与评测机通过消息队列通信，评测得以在多台机器上运行。
voj.misc.about.milestone-2018 = Web 与评测机组件实现 Docker 容器化。
voj.misc.about.milestone-2023 = 两个模块均升级至 Spring 6。
voj.misc.about.milestone-2026 = Web 与评测机模块均基于 Spring Boot 4 重建。
voj.misc.about.milestone-sandbox = 原生 Linux 和 Windows 沙箱取代旧版运行器。
voj.misc.about.milestone-redesign = 全站焕然一新的 UI 设计。
