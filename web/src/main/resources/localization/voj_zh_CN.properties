voj.misc.help.verdict-wa-desc = 输出不匹配
voj.misc.help.verdict-tle = 超时
voj.misc.help.verdict-tle-desc = 某个测试点过慢
voj.misc.help.verdict-mle = 内存超限
voj.misc.help.verdict-mle-desc = 超出内存上限
voj.misc.help.verdict-re = 运行时错误
voj.misc.help.verdict-re-desc = 运行中崩溃
voj.misc.help.verdict-ce = 编译错误
voj.misc.help.verdict-ce-desc = 源代码编译失败
voj.misc.help.faq = 常见问题
voj.misc.help.faq-group-getting-started = 入门
voj.misc.help.faq-group-judging = 评测与结果
voj.misc.help.faq-group-contests = 竞赛
voj.misc.help.faq-group-account = 账号
voj.misc.help.faq-q1 = 如何提交我的第一份解答？
voj.misc.help.faq-a1 = 从 ~/problems 打开一道题，在编辑器中选择语言，粘贴或输入代码，然后点击提交。你的代码会被排入最近的评测机队列，随着每个测试点的运行，结果会实时显示。
voj.misc.help.faq-q2 = 支持哪些语言？
voj.misc.help.faq-a2 = C 11、C++ 23、Java 25、Python 3.14、Kotlin 和 Go。每种语言都有各自的编译参数和时间限制倍率，显示在提交面板上。
voj.misc.help.faq-q3 = 查看题目需要账号吗？
voj.misc.help.faq-a3 = 无需账号即可浏览题面，但提交代码、参加竞赛和登上排行榜需要注册。
voj.misc.help.faq-q4 = 各评测结果代码是什么意思？
voj.misc.help.faq-a4 = 参见上方的评测结果图例。AC 表示所有测试点通过；WA、TLE、MLE、RE 和 CE 各自指向一种具体的失败原因，便于你定位问题。
voj.misc.help.faq-q5 = 我的解答为什么会 TLE？
voj.misc.help.faq-a5 = 你的程序在至少一个测试点上超过了时间限制。分析你算法的复杂度，避免缓慢的 I/O，并在提交详情页查看每个测试点的耗时，找出慢的那个用例。
voj.misc.help.faq-q6 = 我能看到是哪个测试点失败了吗？
voj.misc.help.faq-a6 = 对练习题，提交详情页会显示第一个失败的测试点编号、运行时间和内存。隐藏的测试输入本身不会公开。
voj.misc.help.faq-q7 = 评测有多快？
voj.misc.help.faq-a7 = 提交通过 ActiveMQ 分发到评测机集群，往返延迟中位数约 11 毫秒。竞赛高峰期可能会有短暂排队。
voj.misc.help.faq-q8 = ACM 和 OI 赛制有何不同？
voj.misc.help.faq-a8 = ACM 按解题数排名，每次错误尝试计入罚时。OI 按通过的测试点分组给予部分分，因此部分正确的解答仍能得分。每场竞赛都会在详情页注明其赛制。
voj.misc.help.faq-q9 = 竞赛结束后还能提交吗？
voj.misc.help.faq-a9 = 可以 —— 竞赛结束后题目会进入练习区，你可以继续解题。这些提交不影响最终排名。
voj.misc.help.faq-q10 = 如何重置密码？
voj.misc.help.faq-a10 = 使用登录页的“忘记密码”链接。重置链接会发送到你注册的邮箱；若未收到，请检查垃圾邮件或联系 help@verwandlung.org。
voj.misc.help.faq-q11 = 我能修改用户名吗？
voj.misc.help.faq-a11 = 用户名与你的提交历史和排行榜记录绑定，因此修改受限。如确有改名需要，请发邮件联系支持。
voj.misc.help.still-stuck = 仍未解决？
voj.misc.help.still-stuck-desc = 在讨论区向社区提问
