voj.misc.terms.sec11-title = 联系我们
voj.misc.terms.sec1-p1 = 访问 Verwandlung 或创建账号，即表示你同意本服务条款及我们的隐私政策。若不同意，请勿使用本平台。
voj.misc.terms.sec1-p2 = 无论是否注册，本条款适用于所有浏览题目、提交代码、参加竞赛或在讨论区发帖的人。
voj.misc.terms.sec2-p = 你需对账号下的活动负责，并妥善保管密码。一人一号；自动化或共享账号可能被封禁。
voj.misc.terms.sec2-li1 = 提供有效的邮箱，以便我们投递评测结果和安全通知。
voj.misc.terms.sec2-li2 = 注册需年满 13 周岁，或已获监护人同意。
voj.misc.terms.sec2-li3 = 如怀疑账号被未授权访问，请及时通知我们。
voj.misc.terms.sec3-p = Verwandlung 是学习与竞赛平台。请本着善意用它来练习、竞赛和讨论算法。
voj.misc.terms.sec3-li1 = 不得攻击、超载评测机，或试图逃逸评测沙箱。
voj.misc.terms.sec3-li2 = 不得窃取隐藏测试数据，或窥探其他用户的提交。
voj.misc.terms.sec3-li3 = 不得发布垃圾信息、恶意软件，或你无权分享的内容。
voj.misc.terms.sec4-p1 = 你保留所提交源代码的所有权。提交即表示你授予 Verwandlung 有限的许可，用于为返回评测结果而编译、运行、存储和评判你的代码。
voj.misc.terms.sec4-p2 = 我们可能保留提交记录，用于生成你的个人统计、竞赛排名和查重。
voj.misc.terms.sec5-p = 排名竞赛除遵守本条款外，还受其各自规则约束。作弊会破坏所有人的努力，我们严肃对待。
voj.misc.terms.sec5-li1 = 竞赛进行期间，不得分享题解或账号。
voj.misc.terms.sec5-li2 = 不得使用多个账号操纵排名。
voj.misc.terms.sec5-li3 = 除非发起重测，评测引擎给出的结果和罚时为最终结果。
voj.misc.terms.sec6-p = Verwandlung 引擎以 GPL-3.0 协议开源。题面、测试数据和题解内容归各自作者所有，未经许可不得再分发。
voj.misc.terms.sec7-p = 我们运行分布式评测机集群并力求高可用，但服务按“尽力而为”提供。维护、迁移和故障可能不时中断评测。
voj.misc.terms.sec8-p = Verwandlung 按“现状”提供，不作任何形式的担保。我们不保证评测结果、延迟或排名在任何时刻都完全无误。
voj.misc.terms.sec9-p = 在法律允许的最大范围内，对于因使用本平台而产生的任何间接或后果性损害（包括竞赛排名或数据的丢失），Verwandlung 及其维护者概不负责。
voj.misc.terms.sec10-p = 我们可能随平台演进更新本条款。重大变更将在更新日志中公告，上方的生效日期也会随之修订。变更后继续使用即表示你接受变更。
voj.misc.terms.sec11-p = 有关问题、争议或下架请求，可发送至 legal@verwandlung.org，或在项目的 GitHub 仓库提交 issue。
voj.misc.terms.contact-title = 对这些条款有疑问？
voj.misc.terms.contact-desc-prefix = 联系维护者：
voj.misc.terms.contact-desc-suffix = 或在 GitHub 上提交 issue。
