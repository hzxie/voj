# pages/privacy.html
voj.misc.privacy.title = 隐私和Cookie
voj.misc.privacy.eyebrow = 隐私政策
voj.misc.privacy.hero-title = 你的数据，<br>我们<span class="accent">悉心守护。</span>
voj.misc.privacy.hero-lead = 本政策说明 Verwandlung 收集哪些信息、为何收集，以及你对这些信息拥有的控制权。我们将数据保持最少 —— 只收集评测、竞赛和你的个人资料真正需要的部分。
voj.misc.privacy.chip-effective = 生效于
voj.misc.privacy.chip-gdpr-aligned = 合规
voj.misc.privacy.chip-read = 约 4 分钟阅读
voj.misc.privacy.toc = 目录
voj.misc.privacy.sec1-title = 我们收集的信息
voj.misc.privacy.sec2-title = 我们如何使用信息
voj.misc.privacy.sec3-title = Cookie 与本地存储
voj.misc.privacy.sec4-title = 代码与提交数据
voj.misc.privacy.sec5-title = 数据共享
voj.misc.privacy.sec6-title = 数据留存
voj.misc.privacy.sec7-title = 安全
voj.misc.privacy.sec8-title = 你的权利
voj.misc.privacy.sec9-title = 儿童隐私
voj.misc.privacy.sec10-title = 本政策的变更
voj.misc.privacy.sec11-title = 联系我们
voj.misc.privacy.sec1-p = 我们只收集平台运行所必需的信息。Verwandlung 上没有任何第三方广告或追踪像素。
voj.misc.privacy.sec1-li1 = 账号数据 —— 用户名、邮箱和经过哈希处理的密码。
voj.misc.privacy.sec1-li2 = 提交数据 —— 你的源代码、语言、评测结果、运行时间和内存。
voj.misc.privacy.sec1-li3 = 活动数据 —— 竞赛参与、讨论发帖和个人资料设置。
voj.misc.privacy.sec1-li4 = 技术数据 —— IP 地址和浏览器代理，出于安全目的临时保留。
voj.misc.privacy.sec2-p = 你的数据驱动核心体验：编译与评判代码、生成你的个人统计、计算竞赛排名，并保障平台安全。
voj.misc.privacy.sec2-li1 = 返回评测结果并推送结果通知。
voj.misc.privacy.sec2-li2 = 计算排行榜、评分和解题历史。
voj.misc.privacy.sec2-li3 = 检测滥用、抄袭和沙箱逃逸行为。
voj.misc.privacy.sec3-p = 我们使用会话 Cookie 让你保持登录，并用浏览器本地存储记住主题等偏好。我们不会用 Cookie 跨站追踪你。
voj.misc.privacy.sec4-p = 提交的源代码会被存储，方便你日后查看，也便于我们进行查重。隐藏测试和竞赛中的代码绝不会被出售或分享给广告商。
voj.misc.privacy.sec5-p = 我们不会出售你的个人数据。部分信息按设计是公开的 —— 你的用户名、评分和通过的提交会显示在排行榜和个人主页上。
voj.misc.privacy.sec5-li1 = 公开：用户名、头像、评分和已解决的题目。
voj.misc.privacy.sec5-li2 = 私密：邮箱、IP 地址和密码哈希。
voj.misc.privacy.sec5-li3 = 仅在法律要求时，我们才会披露数据。
voj.misc.privacy.sec6-p = 账号有效期间，我们会保留账号和提交数据。如果你删除账号，个人标识信息会被移除，但为保证排名完整性，匿名化的竞赛成绩可能会保留。
voj.misc.privacy.sec7-p = 密码经加盐哈希处理，流量通过 TLS 传输，评测机在隔离沙箱中运行。没有系统是绝对安全的，但我们会努力保护你的数据并迅速响应安全事件。
voj.misc.privacy.sec8-p = 你可以随时访问、导出、更正或删除你的个人数据。发送邮件至 privacy@verwandlung.org，我们将在合理期限内回复。
voj.misc.privacy.sec9-p = Verwandlung 不面向 13 岁以下的儿童。若你认为有儿童未经同意注册，请联系我们，我们会删除该账号。
voj.misc.privacy.sec10-p = 我们可能随平台变化更新本政策。重大更新将在更新日志中公告，上方的生效日期也会随之修订。
voj.misc.privacy.sec11-p = 隐私相关问题和数据请求可发送至 privacy@verwandlung.org，或在项目的 GitHub 仓库提交 issue。
voj.misc.privacy.contact-title = 想获取或删除你的数据副本？
voj.misc.privacy.contact-desc-prefix = 发送邮件至
voj.misc.privacy.contact-desc-suffix = 我们会处理你的请求。
voj.misc.privacy.visit-help = 访问帮助中心

# pages/help.html
voj.misc.help.title = 帮助中心
voj.misc.help.eyebrow = 帮助中心
voj.misc.help.hero-title = 遇到问题？<span class="accent">man verwandlung</span>
voj.misc.help.hero-lead = 关于提交代码、读懂评测结果和参加竞赛的快速解答。找不到答案？讨论区和维护者触手可及。
voj.misc.help.quick-start = 快速上手
voj.misc.help.q1-title = 提交一份解答
voj.misc.help.q1-desc = 打开任意题目，选择语言，粘贴代码，点击提交。评测结果会在毫秒间返回。
voj.misc.help.q2-title = 读懂你的评测结果
voj.misc.help.q2-desc = 每个测试点都会显示状态、运行时间和内存。点击某次提交可查看每个测试点的详情。
voj.misc.help.q3-title = 参加竞赛
voj.misc.help.q3-desc = 浏览进行中和即将开始的竞赛，报名，并在 ACM 或 OI 赛制下解题。
