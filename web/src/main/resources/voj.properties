# Database Configuration
jdbc.driverClassName = com.mysql.cj.jdbc.Driver
jdbc.url = jdbc:mysql://localhost:3306/voj?characterEncoding=UTF-8&autoReconnect=true&serverTimezone=UTC
jdbc.username = root
jdbc.password = 
jdbc.initialSize = 5
jdbc.maxActive = 30
jdbc.minIdle = 3
jdbc.maxIdle = 10
jdbc.maxWait = 30000
jdbc.timeBetweenEvictionRunsMillis = 60000
jdbc.minEvictableIdleTimeMillis = 25200000
jdbc.removeAbandoned = true
jdbc.removeAbandonedTimeout = 1800

# Mail Service Configuration
mail.host = 
mail.username = 
mail.password = 
mail.senderMail = noreply@example.com
mail.senderName = Verwandlung Online Judge

# Message Service Configuration
jms.broker.url = tcp://localhost:61616

# Time-to-live (ms) for a submission judging task. If no judger claims it within this window (e.g.
# no online judger supports its language), the broker expires it to the dead-letter queue and the
# submission is marked as failed instead of staying Pending forever. Keep it generous so a
# temporarily busy or offline (but capable) cluster does not fail otherwise valid submissions.
# Default: 30 minutes.
jms.submissionTask.ttl = 1800000

# Web Service Configuration
url.base = http://localhost:8080/voj
url.cdn = http://localhost:8080/voj/assets

