# The following line is used for #include attack
#if false

# Deployment knobs are resolved at runtime from environment variables, with the
# value after ':' used as the fallback. So every VOJ_* below can be overridden
# without rebuilding the jar, e.g. `docker run -e VOJ_DB_HOST=db.internal ...` or
# `VOJ_BASE_URL=https://oj.example.edu java -jar voj.web.jar`. The defaults keep a
# from-source local run (MySQL on localhost, no reverse proxy) working as before.

# Database Configuration
jdbc.driverClassName = com.mysql.cj.jdbc.Driver
jdbc.url = jdbc:mysql://${VOJ_DB_HOST:localhost}:${VOJ_DB_PORT:3306}/${VOJ_DB_NAME:voj}?characterEncoding=UTF-8&autoReconnect=true&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
jdbc.username = ${VOJ_DB_USERNAME:root}
jdbc.password = ${VOJ_DB_PASSWORD:}
jdbc.initialSize = 2
jdbc.maxActive = 8
jdbc.minIdle = 2
jdbc.maxWait = 30000
jdbc.timeBetweenEvictionRunsMillis = 60000
jdbc.minEvictableIdleTimeMillis = 25200000
jdbc.removeAbandoned = false
jdbc.removeAbandonedTimeout = 1800

# Mail Service Configuration
mail.host = ${VOJ_MAIL_HOST:}
mail.username = ${VOJ_MAIL_USERNAME:}
mail.password = ${VOJ_MAIL_PASSWORD:}
mail.senderMail = ${VOJ_MAIL_SENDER:noreply@example.com}
mail.senderName = ${VOJ_MAIL_SENDER_NAME:Verwandlung Online Judge}

# Message Service Configuration
jms.broker.url = ${VOJ_JMS_BROKER_URL:tcp://localhost:61616}

# Run the ActiveMQ broker embedded inside this web process instead of as a separate one. When true,
# the web app hosts the broker itself (in-process vm:// transport) and opens jms.broker.url as a TCP
# connector so out-of-process judgers can still connect — saving a whole standalone broker JVM
# (~150 MB+). The embedded broker is non-persistent, so a web restart drops in-flight submission
# tasks; it also ties the broker's lifecycle to this single web instance, so do NOT enable it when
# running multiple web instances. When true, the deployment must NOT also start the standalone
# broker (both bind jms.broker.url). Default: false (use an external broker).
jms.broker.embedded = ${VOJ_JMS_BROKER_EMBEDDED:false}

# Checkpoint Distribution Configuration
# Shared secret a judger must present (X-Judger-Token header) to download a problem's test data from
# /api/judger/checkpoints/{problemId}. Must match judger.apiToken on every judger. An empty value
# disables the endpoint (all requests are refused). Change this to a long random string in production.
judger.apiToken = ${VOJ_JUDGER_API_TOKEN:}

# Time-to-live (ms) for a submission judging task. If no judger claims it within this window (e.g.
# no online judger supports its language), the broker expires it to the dead-letter queue and the
# submission is marked as failed instead of staying Pending forever. Keep it generous so a
# temporarily busy or offline (but capable) cluster does not fail otherwise valid submissions.
# Default: 30 minutes.
jms.submissionTask.ttl = 1800000

# Web Service Configuration
# VOJ_BASE_URL is the site's public root (used in e-mails and absolute links);
# behind a reverse proxy set it to the externally visible URL, e.g.
# https://oj.example.edu. url.cdn defaults to VOJ_BASE_URL + /assets unless you
# serve static assets from a separate host via VOJ_CDN_URL.
url.base = ${VOJ_BASE_URL:http://localhost:8080/voj}
url.cdn = ${VOJ_CDN_URL:${VOJ_BASE_URL:http://localhost:8080/voj}/assets}

#endif
