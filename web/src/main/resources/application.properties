# Verwandlung Online Judge - Web Application
#
# Framework-level wiring for Spring Boot. Deployment knobs (database, message
# queue, mail server, URLs) live in voj.properties.

spring.application.name=voj.web

# Servlet container. The port and context path are overridable at runtime (e.g.
# serve at the root with VOJ_CONTEXT_PATH=/ behind a reverse proxy); keep
# VOJ_BASE_URL in sync with the context path since that is what e-mails and
# absolute links use.
server.port=${VOJ_HTTP_PORT:8080}
server.servlet.context-path=${VOJ_CONTEXT_PATH:/voj}
server.servlet.session.timeout=60m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Multipart uploads (problem test-data archives). Kept generous because a single
# problem's test data can be large; the controller additionally caps the parsed
# uncompressed size.
spring.servlet.multipart.max-file-size=128MB
spring.servlet.multipart.max-request-size=128MB

# Thymeleaf renders both the web views (classpath:/templates/pages/**.html) and
# the HTML e-mail bodies (classpath:/templates/mail/**). Shared page layouts live
# under classpath:/templates/layouts and reusable fragments under
# classpath:/templates/fragments; the decorator-style layout is provided by the
# Thymeleaf Layout Dialect.

# MyBatis XML mappers
mybatis.mapper-locations=classpath:/mappers/*.xml
