# Verwandlung Online Judge - Web Application
#
# Framework-level wiring for Spring Boot. Deployment knobs (database, message
# queue, mail server, URLs) live in voj.properties.

spring.application.name=voj.web

# Servlet container
server.port=8080
server.servlet.context-path=/voj
server.servlet.session.timeout=60m
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# MyBatis XML mappers
mybatis.mapper-locations=classpath:/mappers/*.xml

# FreeMarker is only used for rendering e-mail templates, so disable its MVC
# view resolver to keep it from interfering with the JSP view resolver.
spring.freemarker.enabled=false
