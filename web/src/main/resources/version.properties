# Generated at build time by Maven; do not edit by hand.
#   build.version   - the abbreviated git commit hash (git-commit-id-maven-plugin),
#                     used as the static-asset cache-busting key in the JSP views.
#   product.version - the Maven project version, which the maven-git-versioning-extension
#                     derives from the current git tag/branch (see .mvn/), so the displayed
#                     release version tracks the latest tag automatically.
# See the resource-filtering configuration in web/pom.xml.
build.version=@git.commit.id.abbrev@
product.version=@project.version@
