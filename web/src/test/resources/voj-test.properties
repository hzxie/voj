mail.senderName =   

# Message Service Configuration
# Tests host their own non-persistent vm:// broker (see test-spring-context.xml), so keep the
# embedded-broker mode off here even though production (voj.properties) enables it; otherwise
# JmsConfig.embeddedBroker would open a second vm://localhost connector and collide with it.
jms.broker.embedded = false
jms.broker.url = vm://localhost?broker.persistent=false

