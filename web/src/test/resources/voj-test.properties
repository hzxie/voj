# Database Configuration
jdbc.driverClassName = com.mysql.cj.jdbc.Driver
# createDatabaseIfNotExist lets the test suite provision the schema itself (the
# DataSourceInitializer in test-spring-context.xml runs schema/seed/test-data),
# so CI no longer needs a "CREATE DATABASE" / "mysql < voj.sql" step. sql_mode is
# pinned to STRICT_TRANS_TABLES on every pooled connection: strict so the mapper
# tests still see DataIntegrityViolationException on over-long/invalid values, but
# without ONLY_FULL_GROUP_BY (which the GROUP BY queries need) or NO_ZERO_DATE
# (which would reject the legacy '0000-00-00' column defaults). This replaces the
# SET GLOBAL sql_mode hack the CI configs used to run.
jdbc.url = jdbc:mysql://localhost:3306/test?characterEncoding=UTF-8&serverTimezone=UTC&createDatabaseIfNotExist=true&sessionVariables=sql_mode='STRICT_TRANS_TABLES'
jdbc.username = root
jdbc.password = 
jdbc.initialSize = 1
jdbc.maxActive = 1
jdbc.minIdle = 0
jdbc.maxWait = 1800
jdbc.timeBetweenEvictionRunsMillis = 1800
jdbc.minEvictableIdleTimeMillis = 1800
jdbc.removeAbandoned = false
jdbc.removeAbandonedTimeout = 1800

