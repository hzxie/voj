# Example nginx reverse proxy for Verwandlung Online Judge.
#
# Fronts the web container (published on 127.0.0.1:8080) with TLS at a public
# hostname. Run the web container with the matching public URL so generated links,
# e-mails and assets are correct, e.g.:
#
#   # served under /voj (the default context path):
#   docker run ... -e VOJ_BASE_URL=https://oj.example.edu/voj zjhzxhz/voj.web
#
#   # or served at the site root:
#   docker run ... -e VOJ_CONTEXT_PATH=/ -e VOJ_BASE_URL=https://oj.example.edu zjhzxhz/voj.web
#
# The critical part is the real-time judge result stream: it is Server-Sent
# Events, so proxy buffering MUST be off and the read timeout long, otherwise
# results never reach the browser (they sit in nginx's buffer) and the connection
# is cut after the default 60s.

upstream voj_web {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name oj.example.edu;

    # ssl_certificate     /etc/letsencrypt/live/oj.example.edu/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/oj.example.edu/privkey.pem;

    # Problem test-data archives can be large; raise the upload cap to match the
    # app's 128 MB multipart limit.
    client_max_body_size 128m;

    # Real-time judge result stream (SSE): no buffering, long-lived connection.
    # Match both the default /voj context path and a root deployment.
    location ~ ^(/voj)?/submission/getRealTimeJudgeResult\.action$ {
        proxy_pass http://voj_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;          # stream events straight through
        proxy_cache off;
        proxy_read_timeout 1h;        # judging can take a while
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://voj_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
